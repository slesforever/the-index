<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>The Index | Weaver Terminal V4.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --index-cyan: #00f2ff;
            --index-red: #ff003c;
            --index-bg: #010808;
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Noto Serif TC', serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 背景網格與掃描線 */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
        }

        /* 開機畫面 (BIOS風格) */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }

        .boot-container {
            width: 450px;
            border: 1px solid var(--index-cyan);
            padding: 30px;
            background: rgba(0, 20, 20, 0.8);
            box-shadow: var(--border-glow);
            position: relative;
        }

        .boot-header {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--index-cyan);
            border-bottom: 1px solid var(--index-cyan);
            margin-bottom: 20px;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .init-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--index-cyan);
            color: var(--index-cyan);
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .init-btn:hover {
            background: var(--index-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--index-cyan);
        }

        #boot-logs {
            margin-top: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--index-cyan);
            height: 100px;
            overflow: hidden;
            line-height: 1.4;
            opacity: 0.7;
        }

        /* 像素劃開動畫 */
        .pixel-door {
            position: fixed;
            top: 0; width: 50.5%; height: 100%;
            background: #000;
            z-index: 9000;
            transition: transform 1.2s steps(12); /* 像素化步進感 */
        }
        .door-left { left: 0; border-right: 2px solid var(--index-cyan); }
        .door-right { right: 0; border-left: 2px solid var(--index-cyan); }

        .opened .door-left { transform: translateX(-100%); }
        .opened .door-right { transform: translateX(100%); }

        /* 主界面 - 置中修正 */
        .terminal {
            width: 90%;
            max-width: 800px;
            padding: 50px;
            border: 1px solid var(--index-cyan);
            background: rgba(1, 10, 10, 0.9);
            text-align: center;
            box-shadow: var(--border-glow);
            z-index: 100;
            position: relative;
            visibility: hidden; /* 防止未開機前閃現 */
        }

        #main-ui.active { visibility: visible; }

        .logo { width: 150px; margin-bottom: 30px; filter: drop-shadow(0 0 10px var(--index-cyan)); }

        #display-area {
            min-height: 220px;
            margin: 20px 0;
            padding: 30px;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #prescript-text { font-size: 1.25rem; line-height: 2.2; color: #fff; text-shadow: 0 0 15px var(--index-cyan); letter-spacing: 2px; }

        .reason { display: block; font-size: 0.9rem; margin-top: 30px; color: var(--index-cyan); opacity: 0.5; font-style: italic; }

        .gen-btn {
            background: transparent;
            border: 1px solid var(--index-cyan);
            color: var(--index-cyan);
            padding: 12px 50px;
            font-size: 1rem;
            letter-spacing: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .gen-btn:hover:not(:disabled) { background: var(--index-cyan); color: #000; box-shadow: 0 0 20px var(--index-cyan); }

        /* 崩潰模式特效 */
        body.crash-mode { animation: screen-shake 0.1s infinite; }
        body.crash-mode .terminal { border-color: var(--index-red); box-shadow: 0 0 40px var(--index-red); }
        body.crash-mode #prescript-text { color: var(--index-red); text-shadow: 0 0 15px var(--index-red); }

        @keyframes screen-shake {
            0% { transform: translate(3px, 0); }
            25% { transform: translate(-3px, 2px); }
            50% { transform: translate(2px, -3px); }
            75% { transform: translate(-2px, 1px); }
            100% { transform: translate(0, 0); }
        }

        #player-wrapper { position: absolute; top: -999px; visibility: hidden; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="crt-overlay"></div>

    <div id="player-wrapper">
        <div id="player"></div>
    </div>

    <div id="pixel-wipe">
        <div class="pixel-door door-left"></div>
        <div class="pixel-door door-right"></div>
    </div>

    <div id="boot-screen">
        <div class="boot-container">
            <div class="boot-header">
                <span>INDEX_OS [VER 4.1.0]</span>
                <span id="clock">00:00:00</span>
            </div>
            <button class="init-btn" id="start-btn" onclick="runBoot()">[ INITIALIZE SYSTEM ]</button>
            <div id="boot-logs"></div>
        </div>
    </div>

    <div class="terminal" id="main-ui">
        <img src="250px-LOR-Index-Icon.webp" alt="Index" class="logo">
        <div id="display-area">
            <div id="prescript-text">系統連線已建立。等待因果紡織...</div>
        </div>
        <button class="gen-btn" id="gen-btn" onclick="getPrescript()" disabled>接收指令</button>
    </div>

    <audio id="type-sfx" src="the-index-message.mp3"></audio>

    <script>
        // --- YouTube API 邏輯 ---
        var player;
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: '7HHJFKtFiSE',
                playerVars: { 
                    'autoplay': 0, 
                    'loop': 1, 
                    'playlist': '7HHJFKtFiSE',
                    'controls': 0
                }
            });
        }

        // --- 核心邏輯 ---
        const logs = [
            "Detecting Proxy Neural Link...",
            "Decrypting Textile Key...",
            "Synchronizing with Library Hub...",
            "Neutralizing anomalies in Sector 23...",
            "Cause and Effect: CALCULATED.",
            "Index Terminal v4.1 ONLINE."
        ];

        function runBoot() {
            document.getElementById('start-btn').style.display = 'none';
            const logBox = document.getElementById('boot-logs');
            let i = 0;
            
            const logTimer = setInterval(() => {
                if (i < logs.length) {
                    const p = document.createElement('p');
                    p.innerText = `> ${logs[i]}`;
                    logBox.appendChild(p);
                    i++;
                } else {
                    clearInterval(logTimer);
                    setTimeout(() => {
                        // 音樂播放
                        if (player && player.playVideo) player.playVideo();
                        
                        // 動態過渡
                        document.getElementById('pixel-wipe').classList.add('opened');
                        document.getElementById('boot-screen').style.opacity = '0';
                        
                        setTimeout(() => {
                            document.getElementById('boot-screen').style.display = 'none';
                            const main = document.getElementById('main-ui');
                            main.classList.add('active');
                            document.getElementById('gen-btn').disabled = false;
                        }, 600);
                    }, 500);
                }
            }, 300);
        }

        // 隨機資料庫 (100+ 零件結構)
        const prescriptData = {
            time: ["在落日最後一抹暗紅被都市吞噬時", "當霓虹燈發出嘶嘶的斷裂聲後", "在感覺到心跳與秒針同步的瞬間", "當深夜兩點與三點的夾縫中", "在看見一根落下的髮絲觸地的瞬間", "當你聽見門外傳來三聲規律的敲擊時", "在螢幕出現雪花般幻覺的閃爍後", "當你感覺到呼吸節奏發生紊亂時", "在看見一隻灰鳥掠過廢墟的剎那", "當自動販賣機的燈光剛好熄滅時"],
            loc: ["在23區那條佈滿鏽蝕氣味的暗巷", "對著浴室鏡中那張逐漸陌生的臉孔", "在堆滿昨日悔恨信件的抽屜前", "於L區廢棄的加工廠二樓轉角", "站在巢的邊界，凝視著那片焦土", "在無人的圖書館第五排書架前", "對著一台運轉異常且發熱的設備", "在充满消毒水與鐵鏽味的樓梯間", "站在一個只有你與織布機記得的地點", "於被路燈拉長且變形的陰影中央"],
            act: ["將左手食指按壓在冰冷的牆面上", "撕碎一張寫滿昨日回憶的廢紙條", "逆時針原地旋轉三圈，直到暈眩", "將三枚硬幣整齊排列在桌子的邊緣", "用指尖在桌面上劃出一道筆直的線", "閉上眼走完這段走廊的最後十步", "將杯中最後一口水灑向陽光照不到處", "用掌心感受這台終端機散發的熱量", "在紙上寫下「代行者」三個字並對摺", "將領帶或鈕扣重新整理至絕對對稱"],
            target: ["隨後靜候那不可更改的終局", "接著將這段記憶徹底從腦海抹除", "並向著未知的織布機獻上祈禱", "同時在心中默念指令是絕對的", "隨即轉身離開，不可再次回頭", "感受指尖留下的那一抹冰冷餘溫", "並在此處佇立至感覺到背後的惡寒", "接著在心中確認因果已經完成閉環", "隨後讓這份寂靜吞噬你的自我意識", "並等待下一個紡織點的到來"],
            rsn: ["這是為了讓扭曲的線條回歸筆直。", "因果在此處交匯，代價已被支付。", "指令即是生存的唯一支柱。", "織布機已預見此路徑，不得質疑。", "都市的齒輪需要這份微小的摩擦。"]
        };

        function getPrescript() {
            const isCrash = Math.random() < 0.03; // 3% 崩潰率
            const btn = document.getElementById('gen-btn');
            const display = document.getElementById('prescript-text');
            const sfx = document.getElementById('type-sfx');

            btn.disabled = true;
            display.innerHTML = "";

            if (isCrash) {
                // 觸發崩潰
                document.body.classList.add('crash-mode');
                let crashCount = 0;
                const glitch = setInterval(() => {
                    display.innerText = Math.random().toString(36).substring(2, 15) + " CRITICAL_ERROR " + Math.random().toString(36).substring(2, 15);
                    crashCount++;
                    if (crashCount > 25) {
                        clearInterval(glitch);
                        display.innerText = "CAUSE DISCONNECTED. REBOOTING...";
                        setTimeout(() => location.reload(), 2000);
                    }
                }, 60);
            } else {
                // 正常生成
                const prescript = `「${r(prescriptData.time)}，${r(prescriptData.loc)}，${r(prescriptData.act)}，${r(prescriptData.target)}。」`;
                const reason = r(prescriptData.rsn);
                
                sfx.currentTime = 0;
                sfx.play();
                
                let j = 0;
                const typing = setInterval(() => {
                    if (j < prescript.length) {
                        display.innerHTML += prescript[j++];
                    } else {
                        clearInterval(typing);
                        const rDiv = document.createElement('div');
                        rDiv.className = 'reason';
                        rDiv.innerText = `— ${reason}`;
                        display.appendChild(rDiv);
                        btn.disabled = false;
                    }
                }, (sfx.duration * 1000) / prescript.length);
            }
        }

        function r(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // 簡單 BIOS 時鐘
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }, 1000);
    </script>
</body>
</html>
