<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Index | Infinite Prescript</title>
    <style>
        :root {
            --index-cyan: #00f2ff;
            --bg-black: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--index-cyan);
            font-family: "Noto Serif TC", serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* CRT 掃描線效果 */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 100;
        }

        .terminal {
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border: 2px solid var(--index-cyan);
            background: rgba(0, 0, 0, 0.95);
            position: relative;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            text-align: center;
        }

        .header-logo {
            width: 160px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--index-cyan));
        }

        #display-area {
            min-height: 180px;
            border-top: 1px solid var(--index-cyan);
            padding-top: 25px;
            margin-top: 20px;
        }

        #prescript-text {
            font-size: 1.35rem;
            line-height: 1.8;
            color: #fff;
            text-shadow: 0 0 10px var(--index-cyan);
        }

        .reason {
            display: block;
            font-size: 0.85rem;
            margin-top: 20px;
            color: var(--index-cyan);
            opacity: 0.6;
            letter-spacing: 2px;
            font-style: italic;
        }

        button {
            margin-top: 30px;
            background: transparent;
            border: 1px solid var(--index-cyan);
            color: var(--index-cyan);
            padding: 12px 35px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background: var(--index-cyan);
            color: black;
            box-shadow: 0 0 20px var(--index-cyan);
        }

        button:disabled { opacity: 0.3; }

        .char { display: inline-block; transition: 0.1s; }
        .glitch { animation: glitch-anim 0.1s infinite alternate; }
        @keyframes glitch-anim {
            0% { opacity: 1; transform: skewX(0deg); }
            100% { opacity: 0.6; transform: skewX(10deg); }
        }
    </style>
</head>
<body>

    <div class="terminal">
        <img src="250px-LOR-Index-Icon.webp" alt="Index" class="header-logo">
        <div id="display-area">
            <div id="prescript-text">INITIALIZING WEAVER...</div>
        </div>
        <button id="btn" onclick="weaverStart()">接收指令</button>
    </div>

    <audio id="index-audio" src="the-index-message.mp3"></audio>

    <script>
        // 紡織機零件庫 (隨機組合邏輯)
        const parts = {
            time: ["在日落時刻", "當下一次鐘聲響起時", "在深夜三點整", "於今日結束前", "在遇見下一個生還者時", "當陰影覆蓋街道時"],
            action: ["對著鏡子梳頭", "將左腳的鞋帶解開", "喝下一杯溫水", "在牆上畫出圓圈", "保持絕對沈默", "撕毀一張白紙", "旋轉三圈後跪下", "觸摸第五根路燈", "向北步行三十步"],
            count: ["三次", "十二秒", "直到呼吸平穩", "直到感覺到惡寒", "一次", "七分鐘"],
            target: ["並凝視虛空", "隨後將其吞噬", "並在大聲呼喊你的名字", "接著將其棄置在長椅上", "同時閉上雙眼"],
            reason: [
                "這是為了填補都市紡織線的空隙。",
                "指令是絕對的。",
                "線條在此處交匯，不可違背。",
                "苦難將轉化為恩寵。",
                "織布機已預見此結果。",
                "代價已被支付。"
            ]
        };

        const audio = document.getElementById('index-audio');
        const textElement = document.getElementById('prescript-text');
        const btn = document.getElementById('btn');

        // 模擬 AI 紡織邏輯
        function generatePrescript() {
            const p = parts;
            const action = `${p.time[Math.floor(Math.random()*p.time.length)]}，${p.action[Math.floor(Math.random()*p.action.length)]}${p.count[Math.floor(Math.random()*p.count.length)]}，${p.target[Math.floor(Math.random()*p.target.length)]}。`;
            const reason = p.reason[Math.floor(Math.random()*p.reason.length)];
            return { action, reason };
        }

        function weaverStart() {
            btn.disabled = true;
            textElement.innerHTML = "";
            
            const content = generatePrescript();
            const fullText = `「${content.action}」`;
            
            audio.currentTime = 0;
            audio.play().then(() => {
                const duration = audio.duration * 1000;
                const charDelay = duration / fullText.length;
                
                let i = 0;
                const typeWriter = setInterval(() => {
                    if (i < fullText.length) {
                        const span = document.createElement('span');
                        span.className = 'char';
                        span.innerText = fullText[i];
                        textElement.appendChild(span);
                        i++;
                    } else {
                        clearInterval(typeWriter);
                        const rSpan = document.createElement('span');
                        rSpan.className = 'reason';
                        rSpan.innerText = `— ${content.reason}`;
                        textElement.appendChild(rSpan);
                        btn.disabled = false;
                    }
                }, charDelay);
            }).catch(() => {
                btn.disabled = false;
                textElement.innerText = "音訊加載失敗，請確認檔案。";
            });
        }

        // 隨機故障
        setInterval(() => {
            const chars = document.querySelectorAll('.char');
            if (chars.length > 0) {
                const target = chars[Math.floor(Math.random() * chars.length)];
                target.classList.add('glitch');
                setTimeout(() => target.classList.remove('glitch'), 150);
            }
        }, 400);
    </script>
</body>
</html>
