<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>THE INDEX | TERMINAL_V6_FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --red: #ff0000;
            --soft-glow: rgba(0, 242, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            color: var(--cyan);
            font-family: 'Noto Serif TC', serif;
            transition: filter 0.2s ease;
        }

        /* 掃描線與微粒氛圍 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 3px; z-index: 9999; pointer-events: none;
        }

        /* 背景微塵效果 */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #051010 0%, #000 70%);
            z-index: -1;
        }

        /* 電視開機動畫 (白點 -> 白線 -> 展開) */
        #tv-boot {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: none; justify-content: center; align-items: center;
        }
        .boot-core { background: #fff; box-shadow: 0 0 30px #fff; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .dot { width: 4px; height: 4px; border-radius: 50%; opacity: 0; }
        .line { width: 100%; height: 1px; border-radius: 0; }
        .open { width: 100%; height: 100%; background: transparent; }

        /* BIOS 啟動介面 */
        #bios {
            z-index: 5000; text-align: center;
        }
        .bios-frame {
            padding: 80px; border: 1px solid rgba(0, 242, 255, 0.1);
            background: rgba(0, 5, 5, 0.5); backdrop-filter: blur(10px);
        }
        .btn-init {
            background: transparent; border: 1px solid var(--cyan);
            color: var(--cyan); padding: 15px 60px;
            font-family: 'Share Tech Mono', monospace; cursor: pointer;
            letter-spacing: 15px; font-size: 1.2rem; transition: 0.5s;
            position: relative; overflow: hidden;
        }
        .btn-init:hover { background: var(--cyan); color: #000; box-shadow: 0 0 50px var(--cyan); }

        /* 終端主介面 */
        #main-ui {
            display: none; flex-direction: column; align-items: center;
            width: 85%; max-width: 900px; z-index: 100;
        }

        /* 聖物漂浮 */
        .relic-box {
            margin-bottom: 60px;
            animation: relic-float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 20px var(--soft-glow));
        }
        .relic-img { width: 180px; opacity: 0.9; }

        @keyframes relic-float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-20px) scale(1.05); opacity: 1; }
        }

        #display-wall {
            width: 100%; min-height: 300px;
            position: relative; text-align: center;
            display: flex; flex-direction: column; justify-content: center;
        }

        .command-text {
            font-size: 1.6rem; line-height: 2.5; color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        .reason-text {
            margin-top: 40px; font-size: 0.95rem; font-style: italic;
            color: var(--cyan); opacity: 0; transition: 1s;
        }

        /* SEVERED 恐怖模式 */
        body.severed-active { filter: invert(1) hue-rotate(180deg); animation: shake 0.05s infinite; }
        @keyframes shake { 0% { transform: translate(5px, 0); } 100% { transform: translate(-5px, 0); } }
        
        #severed-text {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none;
            z-index: 20000; justify-content: center; align-items: center;
            color: #fff; font-size: 8rem; font-weight: 900; letter-spacing: 50px;
        }

        #yt-hide { position: absolute; visibility: hidden; }
    </style>
</head>
<body>

    <div class="particles"></div>
    <div class="overlay"></div>
    <div id="severed-text">SEVERED</div>

    <div id="yt-hide"><div id="player"></div></div>

    <div id="tv-boot">
        <div id="boot-core" class="boot-core dot"></div>
    </div>

    <div id="bios">
        <div class="bios-frame">
            <p style="letter-spacing: 10px; margin-bottom: 30px; font-size: 0.8rem; opacity: 0.4;">CONNECTION_TYPE: PROXY_LINK</p>
            <button class="btn-init" onclick="initSystem()">[ 執行初始化 ]</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="relic-box">
            <img src="250px-LOR-Index-Icon.webp" class="relic-img">
        </div>
        <div id="display-wall">
            <div class="command-text" id="text-out">...已連結至織布機...</div>
            <div class="reason-text" id="reason-out"></div>
        </div>
        <button class="btn-init" id="gen-btn" onclick="fetchInstruction()" style="margin-top: 50px; font-size: 1rem;">接收指令</button>
    </div>

    <audio id="sfx-type" src="the-index-message.mp3"></audio>

    <script>
        var player;
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: '7HHJFKtFiSE',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': '7HHJFKtFiSE' }
            });
        }

        function initSystem() {
            document.getElementById('bios').style.display = 'none';
            const boot = document.getElementById('tv-boot');
            const core = document.getElementById('boot-core');
            boot.style.display = 'flex';

            // 啟動動畫序列
            setTimeout(() => { core.style.opacity = '1'; }, 200);
            setTimeout(() => { core.classList.remove('dot'); core.classList.add('line'); }, 1000);
            setTimeout(() => { 
                core.classList.add('open'); 
                if(player && player.playVideo) player.playVideo();
                setTimeout(() => {
                    boot.style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                }, 600);
            }, 1400);
        }

        const weaver = {
            time: ["在落日最後一抹餘暉被都市啃食殆盡時", "當霓虹燈閃爍出頻率異常的斷裂聲後", "在感覺到血管搏動與秒針完全重合的一瞬", "當深夜三點與四點的夾縫，影子最長時", "在聽見家中的電器發出不屬於此世的鳴叫時"],
            loc: ["在23區那條佈滿鏽蝕與腐敗氣味的死巷", "對著鏡中那張笑容逐漸崩壞、不再是你的臉孔", "於L區廢棄工廠內，那台正渴求鮮血的織布機前", "站在巢的邊界，凝視著被焦油與謊言覆蓋的廢墟", "在一個充滿回聲且絕對沒有出口的地下長廊盡頭"],
            act: ["將左手的小指緩緩浸入零度的冰水中", "用指尖在斑駁牆面摳抓出一道扭曲的因果線", "將寫有你真名的紙條在指尖一點點撕碎並吞下", "逆時針原地旋轉四次，直到感覺靈魂發生位移", "對著虛無的陰影進行一次最沈重、最卑微的跪拜"],
            target: ["隨後靜候那早已寫在因果紡織中的終局", "接著將這段指令從你的靈魂中徹底剜去", "並向著永恆的織布機獻上最後的、無言的順從", "感受因果的絞索在頸部緩緩收緊的冰冷質感", "隨即轉身步入黑暗，此生不得再次回頭望向光明"],
            reason: ["線條必須筆直，代價由代行者支付。", "因果已定，質疑者即為這座都市的罪人。", "這是維持平衡的必要之惡，無需理解。", "織布機看見了你的終點。服從，或是終結。"]
        };

        function fetchInstruction() {
            const isCrash = Math.random() < 0.04;
            const btn = document.getElementById('gen-btn');
            const out = document.getElementById('text-out');
            const reOut = document.getElementById('reason-out');
            const sfx = document.getElementById('sfx-type');

            btn.disabled = true;
            out.innerHTML = "";
            reOut.style.opacity = "0";

            if (isCrash) {
                if(player && player.stopVideo) player.stopVideo();
                document.body.classList.add('severed-active');
                document.getElementById('severed-text').style.display = 'flex';
                
                let count = 0;
                const cr = setInterval(() => {
                    out.innerText = "FATAL: CAUSE_SEVERED_" + Math.random().toString(16).toUpperCase();
                    count++;
                    if(count > 50) {
                        clearInterval(cr);
                        setTimeout(() => location.reload(), 1500);
                    }
                }, 40);
            } else {
                const text = `「${r(weaver.time)}，${r(weaver.loc)}，${r(weaver.act)}，${r(weaver.target)}。」`;
                const rsn = r(weaver.reason);
                sfx.currentTime = 0;
                sfx.play();

                let j = 0;
                const typer = setInterval(() => {
                    if (j < text.length) {
                        out.innerHTML += text[j++];
                    } else {
                        clearInterval(typer);
                        reOut.innerText = `— ${rsn}`;
                        reOut.style.opacity = "0.4";
                        btn.disabled = false;
                    }
                }, (sfx.duration * 1000) / text.length);
            }
        }

        function r(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    </script>
</body>
</html>
