<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>THE INDEX | PROXY_TERMINAL_V7.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.5);
            --red: #ff0000;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: var(--bg-dark); 
            overflow: hidden; 
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
        }

        /* --- 核心濾鏡：CRT 效果 --- */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            z-index: 1000; pointer-events: none;
        }

        /* 螢幕閃爍 */
        @keyframes flicker {
            0% { opacity: 0.97; } 5% { opacity: 0.95; } 10% { opacity: 0.9; } 
            15% { opacity: 0.95; } 30% { opacity: 0.98; } 100% { opacity: 1; }
        }
        .screen-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: flicker 0.15s infinite;
        }

        /* --- 點擊波紋 --- */
        .ripple {
            position: absolute; border: 1px solid var(--cyan); border-radius: 50%;
            transform: scale(0); animation: ripple-out 1s cubic-bezier(0, 0.5, 0.5, 1);
            pointer-events: none; z-index: 999;
        }
        @keyframes ripple-out { to { transform: scale(6); opacity: 0; } }

        /* --- 開機流程 --- */
        #tv-boot {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center;
        }
        .boot-bar { width: 0%; height: 2px; background: #fff; box-shadow: 0 0 20px #fff; transition: 0.8s; }
        .boot-bar.active { width: 100%; }

        /* --- BIOS 介面 --- */
        #bios { z-index: 5000; text-align: center; }
        .bios-box {
            padding: 60px; border: 1px solid var(--cyan-glow);
            background: rgba(0, 20, 20, 0.2); backdrop-filter: blur(10px);
        }
        .btn-link {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 15px 40px; font-family: 'Share Tech Mono'; font-size: 1.2rem;
            letter-spacing: 5px; cursor: pointer; transition: 0.3s;
        }
        .btn-link:hover { background: var(--cyan); color: #000; box-shadow: 0 0 30px var(--cyan); }

        /* --- 主終端介面 --- */
        #main-ui { display: none; flex-direction: column; align-items: center; width: 85%; max-width: 900px; }

        .logo-area { margin-bottom: 40px; }
        .logo-img { 
            width: 180px; filter: drop-shadow(0 0 15px var(--cyan-glow)); 
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #display-wall {
            width: 100%; min-height: 300px; padding: 40px;
            border-top: 1px solid var(--cyan-glow); border-bottom: 1px solid var(--cyan-glow);
            background: rgba(0, 242, 255, 0.02); position: relative;
        }

        .instruction-text {
            font-family: 'Noto Serif TC', serif; font-size: 1.8rem; font-weight: 600;
            line-height: 2.2; color: #fff; text-shadow: 0 0 10px var(--cyan-glow);
        }
        .meta-info { 
            margin-top: 30px; font-size: 0.9rem; color: var(--cyan); 
            opacity: 0.6; text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- 絕望模式 (SEVERED) --- */
        body.severed-mode { animation: shake 0.05s infinite; filter: invert(1) grayscale(1) contrast(5); }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 100% { transform: translate(-5px, -5px); } }

        #yt-player { position: absolute; top: -1000px; }
    </style>
</head>
<body onclick="makeRipple(event)">

    <div class="crt-overlay"></div>
    
    <div id="yt-player"></div>

    <div id="tv-boot">
        <div id="boot-line" class="boot-bar"></div>
    </div>

    <div class="screen-container">
        <!-- BIOS -->
        <div id="bios">
            <div class="bios-box">
                <p style="margin-bottom: 20px; opacity: 0.5;">AUTHENTICATING_PROXELYTE...</p>
                <button class="btn-link" onclick="initTerminal()">LINK_TO_INDEX</button>
            </div>
        </div>

        <!-- MAIN TERMINAL -->
        <div id="main-ui">
            <div class="logo-area">
                <!-- 使用你指定的圖片路徑 -->
                <img src="https://static.wikia.nocookie.net/library-of-ruina/images/c/cb/IndexProselytesIcon.png/revision/latest/thumbnail/width/360/height/360?cb=20240605231900" class="logo-img">
            </div>
            
            <div id="display-wall">
                <div id="text-out" class="instruction-text">STANDBY_FOR_ORDER...</div>
                <div id="meta-out" class="meta-info"></div>
            </div>

            <button class="btn-link" id="action-btn" onclick="receiveOrder()" style="margin-top: 40px; font-size: 0.9rem;">RECEIVE_WILL</button>
        </div>
    </div>

    <audio id="sfx-type" src="the-index-message.mp3"></audio>

    <script>
        // YouTube API 處理
        var player;
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: '7HHJFKtFiSE',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': '7HHJFKtFiSE' },
                events: { 'onReady': (e) => e.target.setVolume(0) }
            });
        }

        // 點擊波紋
        function makeRipple(e) {
            const r = document.createElement("div");
            r.className = "ripple";
            r.style.left = e.clientX + "px";
            r.style.top = e.clientY + "px";
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 1000);
        }

        // 開機序列
        function initTerminal() {
            const line = document.getElementById('boot-line');
            line.classList.add('active');
            
            if(player) {
                player.playVideo();
                let v = 0;
                let f = setInterval(() => {
                    if(v < 40) { v += 2; player.setVolume(v); } else { clearInterval(f); }
                }, 150);
            }

            setTimeout(() => {
                document.getElementById('tv-boot').style.display = 'none';
                document.getElementById('bios').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            }, 1000);
        }

        const weaverData = {
            time: ["當都市最後一盞路燈熄滅時", "在血管搏動與齒輪聲同步之際", "當時鐘秒針在深夜逆行一格後", "當你的影子試圖撕裂地面逃離時", "在聽見電器發出嘶吼般的鳴叫時"],
            loc: ["在23區那條溢滿鐵鏽味的死巷", "對著鏡中那張不再屬於你的臉孔", "於L區那台正渴求鮮血的織布機前", "站在巢的邊界，凝視焦油般的廢墟", "在一個沒有出口的長廊盡頭"],
            act: ["將左手小指浸入零度的冰水中", "用指甲在牆面摳抓出扭曲的線條", "將寫有罪孽的紙條燒成灰並吞下", "逆時針旋轉四次，直到靈魂位移", "對著虛無進行一次最卑微的跪拜"],
            target: ["隨後靜候那寫在因果中的終局", "接著將這段指令從靈魂中剜去", "並向著織布機獻上最後的順從", "感受因果絞索緩緩收緊的冷感", "隨即步入黑暗，此生不再望向光明"],
            reason: ["STRICT_ADHERENCE_REQUIRED", "WILL_OF_THE_INDEX", "ORDER_IS_ABSOLUTE", "CAUSALITY_PRESERVED"]
        };

        function receiveOrder() {
            const isSevered = Math.random() < 0.04;
            const btn = document.getElementById('action-btn');
            const out = document.getElementById('text-out');
            const meta = document.getElementById('meta-out');
            const sfx = document.getElementById('sfx-type');

            btn.disabled = true;
            out.innerHTML = "";
            meta.innerText = "";

            if (isSevered) {
                if(player) player.stopVideo();
                document.body.classList.add('severed-mode');
                out.style.color = "red";
                out.innerText = "SEVERED_FROM_CAUSALITY";
                setTimeout(() => location.reload(), 2000);
            } else {
                const cmd = `「${r(weaverData.time)}，${r(weaverData.loc)}，${r(weaverData.act)}，${r(weaverData.target)}。」`;
                const rsn = r(weaverData.reason);
                sfx.currentTime = 0; sfx.play();

                let i = 0;
                const timer = setInterval(() => {
                    if(i < cmd.length) {
                        out.innerHTML += cmd[i++];
                    } else {
                        clearInterval(timer);
                        meta.innerText = `>> LOG_REASON: ${rsn}`;
                        btn.disabled = false;
                    }
                }, 60);
            }
        }

        function r(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    </script>
</body>
</html>
