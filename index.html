<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE INDEX :: PRESCRIPT TERMINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
    --cyan:#00f2ff;
    --cyanGlow:rgba(0,242,255,.45);
    --bg:#020305;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#000;
    color:var(--cyan);
    font-family:'Share Tech Mono', monospace;
}

/* ================================================= */
/* BACKGROUND */
/* ================================================= */

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center,
    rgba(0,242,255,.05),
    transparent 55%),
    #000;
    z-index:-5;
}

/* ================================================= */
/* NOISE */
/* ================================================= */

.noise{
    position:fixed;
    inset:0;
    opacity:.06;
    background-image:
    repeating-radial-gradient(circle at 0 0,
    transparent 0,
    #fff 1px,
    transparent 2px);
    animation:noise .18s infinite;
    pointer-events:none;
}

@keyframes noise{
    0%{transform:translate(0,0);}
    25%{transform:translate(2px,-1px);}
    50%{transform:translate(-2px,1px);}
    75%{transform:translate(1px,2px);}
    100%{transform:translate(0,0);}
}

/* ================================================= */
/* CRT */
/* ================================================= */

.crt{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    linear-gradient(rgba(255,255,255,.03) 50%, transparent 50%),
    linear-gradient(90deg,
    rgba(255,0,0,.02),
    rgba(0,255,255,.015),
    rgba(0,0,255,.02));
    background-size:100% 2px, 4px 100%;
}

/* ================================================= */
/* RITUAL BLACKOUT */
/* ================================================= */

#ritual{
    position:fixed;
    inset:0;
    background:#000;
    opacity:0;
    pointer-events:none;
    transition:1.2s;
    z-index:50;
}

/* ================================================= */
/* SCAN */
/* ================================================= */

.scan{
    position:fixed;
    top:-10%;
    left:0;
    width:100%;
    height:2px;
    background:white;
    box-shadow:
    0 0 30px white,
    0 0 80px white;
    opacity:0;
    z-index:60;
}

.scan.active{
    animation:scanDown 1.8s ease;
}

@keyframes scanDown{
    0%{
        top:-10%;
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        top:110%;
        opacity:0;
    }
}

/* ================================================= */
/* SCREEN */
/* ================================================= */

.screen{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:relative;
}

/* ================================================= */
/* LOGO */
/* ================================================= */

.logo{
    width:240px;
    margin-bottom:35px;
    opacity:.88;
    filter:
    drop-shadow(0 0 18px var(--cyanGlow));
    animation:float 5s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

/* ================================================= */
/* TERMINAL */
/* ================================================= */

.terminal{
    width:88%;
    max-width:1000px;
    min-height:500px;
    border:1px solid rgba(0,242,255,.18);
    background:
    linear-gradient(
    rgba(0,20,25,.82),
    rgba(0,8,12,.92));
    position:relative;
    overflow:hidden;
    box-shadow:
    0 0 40px rgba(0,242,255,.08),
    inset 0 0 80px rgba(0,242,255,.04);
}

/* ================================================= */
/* CORNERS */
/* ================================================= */

.corner{
    position:absolute;
    width:25px;
    height:25px;
    border:2px solid var(--cyan);
}

.tl{
    top:-2px;
    left:-2px;
    border-right:0;
    border-bottom:0;
}

.tr{
    top:-2px;
    right:-2px;
    border-left:0;
    border-bottom:0;
}

.bl{
    bottom:-2px;
    left:-2px;
    border-right:0;
    border-top:0;
}

.br{
    bottom:-2px;
    right:-2px;
    border-left:0;
    border-top:0;
}

/* ================================================= */
/* HEADER */
/* ================================================= */

.header{
    height:65px;
    border-bottom:1px solid rgba(0,242,255,.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
    letter-spacing:3px;
    font-size:.85rem;
}

.header-left{
    opacity:.8;
}

.header-right{
    opacity:.35;
}

/* ================================================= */
/* BODY */
/* ================================================= */

.body{
    padding:70px;
    position:relative;
}

/* ================================================= */
/* PRESCRIPT */
/* ================================================= */

.prescript{
    min-height:240px;
    color:white;
    font-family:'Noto Serif TC', serif;
    font-size:1.7rem;
    line-height:2.5;
    text-shadow:
    0 0 8px rgba(255,255,255,.08),
    0 0 18px rgba(0,242,255,.08);
    white-space:pre-wrap;
}

/* ================================================= */
/* STATUS */
/* ================================================= */

.status{
    margin-top:50px;
    opacity:.38;
    font-size:.75rem;
    letter-spacing:3px;
}

/* ================================================= */
/* BUTTON */
/* ================================================= */

.btn{
    margin-top:40px;
    background:transparent;
    border:1px solid var(--cyan);
    color:var(--cyan);
    padding:18px 45px;
    font-family:'Share Tech Mono';
    font-size:1rem;
    letter-spacing:5px;
    cursor:pointer;
    transition:.25s;
}

.btn:hover:not(:disabled){
    background:var(--cyan);
    color:black;
    box-shadow:0 0 35px var(--cyan);
}

.btn:disabled{
    opacity:.2;
    cursor:wait;
}

/* ================================================= */
/* SEAL */
/* ================================================= */

.seal{
    position:absolute;
    right:45px;
    bottom:40px;
    width:110px;
    height:110px;
    border-radius:50%;
    border:2px solid rgba(0,242,255,.25);
    display:flex;
    justify-content:center;
    align-items:center;
    transform:rotate(-15deg) scale(0);
    opacity:0;
    letter-spacing:3px;
    font-size:.75rem;
    color:var(--cyan);
    box-shadow:0 0 25px rgba(0,242,255,.12);
}

.seal.show{
    animation:sealAppear .5s ease forwards;
}

@keyframes sealAppear{
    0%{
        transform:rotate(-15deg) scale(1.8);
        opacity:0;
    }

    100%{
        transform:rotate(-15deg) scale(1);
        opacity:.45;
    }
}

/* ================================================= */
/* HAND NOTES */
/* ================================================= */

.note{
    position:absolute;
    color:rgba(255,255,255,.12);
    font-size:.75rem;
    transform:rotate(-8deg);
    font-family:cursive;
    pointer-events:none;
}

/* ================================================= */
/* GLITCH */
/* ================================================= */

.glitch{
    animation:glitch .07s infinite alternate;
}

@keyframes glitch{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(.5px);
    }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>
<div class="crt"></div>

<div id="ritual"></div>

<div id="scan" class="scan"></div>

<div class="screen">

<img src="250px-LOR-Index-Icon.webp" class="logo">

<div class="terminal glitch">

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="header">

<div class="header-left">
CAUSALITY LINK ESTABLISHED
</div>

<div class="header-right">
PRESCRIPT TERMINAL v9.7
</div>

</div>

<div class="body">

<div id="prescript" class="prescript">
等待接收因果序列...
</div>

<div id="status" class="status"></div>

<div id="seal" class="seal">
SEALED
</div>

<button class="btn" id="receiveBtn" onclick="receivePrescript()">
RECEIVE PRESCRIPT
</button>

</div>

</div>

</div>

<!-- AUDIO -->

<audio id="chant" src="index-chant.mp3" preload="auto"></audio>
<audio id="hum" src="terminal-hum.mp3" preload="auto" loop></audio>
<audio id="typeSfx" src="type.mp3" preload="auto"></audio>
<audio id="sealSfx" src="seal.mp3" preload="auto"></audio>
<audio id="scanSfx" src="scan.mp3" preload="auto"></audio>

<script>

/* ================================================= */
/* AUDIO */
/* ================================================= */

const hum = document.getElementById("hum");
hum.volume = 0.18;

window.addEventListener("click",()=>{
    hum.play();
},{once:true});

/* ================================================= */
/* RANDOM */
/* ================================================= */

function r(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* ================================================= */
/* WEIGHTED */
/* ================================================= */

function wr(arr){

    const total =
    arr.reduce((a,b)=>a+b.weight,0);

    let rand =
    Math.random()*total;

    for(let item of arr){

        rand -= item.weight;

        if(rand <= 0){
            return item.text;
        }
    }

    return arr[0].text;
}

/* ================================================= */
/* DATABASE */
/* ================================================= */

const db = {

trigger:[

{text:"當第二次列車廣播結束時",weight:10},
{text:"於雨水碰觸鞋尖之後",weight:8},
{text:"當便利商店門鈴響起兩次時",weight:10},
{text:"在第三個路口之前",weight:7},
{text:"於午夜後第一道車燈掠過時",weight:6},
{text:"當走廊燈光短暫閃爍時",weight:9},
{text:"在無人注意的瞬間",weight:12},
{text:"於第九次呼吸結束後",weight:5},
{text:"當電子螢幕失去訊號時",weight:6}

],

action:[

{text:"停下腳步三秒",weight:10},
{text:"將左手覆於胸前",weight:8},
{text:"折起任意一張收據",weight:7},
{text:"避免踩到地面的裂痕",weight:10},
{text:"將視線移向右側",weight:5},
{text:"默念第一個浮現的名字",weight:7},
{text:"輕敲牆面一次",weight:8},
{text:"保持沉默直到下一次鐘聲",weight:10},
{text:"不要觸碰任何玻璃表面",weight:9}

],

restriction:[

{text:"期間不得回頭",weight:10},
{text:"不可與任何人交談",weight:8},
{text:"勿確認時間",weight:8},
{text:"不可重新閱讀內容",weight:7},
{text:"不要理解其中意義",weight:6},
{text:"不可表露疑惑",weight:5},
{text:"勿注視自身倒影",weight:9}

],

fate:[

{text:"因果將自行完成編織。",weight:10},
{text:"你的位置已被記錄。",weight:7},
{text:"順從即為答案。",weight:9},
{text:"未被理解之物仍將被執行。",weight:10},
{text:"這是通往既定終點的細線之一。",weight:7},
{text:"織布機從不留下多餘的節點。",weight:6}

]

};

/* ================================================= */
/* CONDITIONAL CLAUSE */
/* ================================================= */

function conditional(action){

    if(action.includes("玻璃")){

        return "若你已看見自身倒影，請停留七秒。";
    }

    if(action.includes("沉默")){

        return "若有人呼喚你的名字，不予回應。";
    }

    return "";
}

/* ================================================= */
/* BUILD */
/* ================================================= */

function buildPrescript(){

    const trigger = wr(db.trigger);
    const action = wr(db.action);
    const restriction = wr(db.restriction);
    const fate = wr(db.fate);

    const extra = conditional(action);

    return `「${trigger}，

${action}。

${restriction}。

${extra}

${fate}」`;

}

/* ================================================= */
/* TYPEWRITER */
/* ================================================= */

async function typeWriter(el,text){

    const typeSfx =
    document.getElementById("typeSfx");

    el.innerHTML = "";

    for(let i=0;i<text.length;i++){

        el.innerHTML += text[i];

        if(text[i] !== " "){

            typeSfx.currentTime = 0;
            typeSfx.play();
        }

        let delay =
        25 + Math.random()*40;

        if("，".includes(text[i]))
            delay += 120;

        if("。".includes(text[i]))
            delay += 380;

        if("\n".includes(text[i]))
            delay += 220;

        if(Math.random() < .03)
            delay += 250;

        await new Promise(r=>setTimeout(r,delay));
    }
}

/* ================================================= */
/* NOTES */
/* ================================================= */

function addNotes(){

    document
    .querySelectorAll(".note")
    .forEach(v=>v.remove());

    const notes = [

        "sequence stable",
        "observation pending",
        "subject complied",
        "causality linked",
        "cross-reference denied",
        "distortion risk low"

    ];

    for(let i=0;i<3;i++){

        const div =
        document.createElement("div");

        div.className = "note";

        div.innerText = r(notes);

        div.style.left =
        Math.random()*70 + "%";

        div.style.top =
        Math.random()*75 + "%";

        document
        .querySelector(".body")
        .appendChild(div);
    }
}

/* ================================================= */
/* GLITCH */
/* ================================================= */

function glitchFlash(){

    document.body.style.filter =
    "brightness(1.5)";

    setTimeout(()=>{

        document.body.style.filter =
        "brightness(1)";
    },90);
}

/* ================================================= */
/* RECEIVE */
/* ================================================= */

async function receivePrescript(){

    const btn =
    document.getElementById("receiveBtn");

    const ritual =
    document.getElementById("ritual");

    const scan =
    document.getElementById("scan");

    const chant =
    document.getElementById("chant");

    const seal =
    document.getElementById("seal");

    btn.disabled = true;

    seal.classList.remove("show");

    document
    .getElementById("status")
    .innerHTML = "";

    /* BLACKOUT */

    ritual.style.opacity = .92;

    document
    .getElementById("scanSfx")
    .play();

    scan.classList.add("active");

    glitchFlash();

    /* CHANT */

    chant.volume = .32;
    chant.currentTime = 0;
    chant.play();

    await new Promise(r=>setTimeout(r,1800));

    /* RETURN */

    ritual.style.opacity = 0;

    /* GENERATE */

    const text =
    buildPrescript();

    addNotes();

    await typeWriter(
        document.getElementById("prescript"),
        text
    );

    /* STATUS */

    document
    .getElementById("status")
    .innerHTML =
    `>> OBS_ID : ${
        Math.floor(Math.random()*999999)
    }
    <br>
    >> CAUSALITY STABLE
    <br>
    >> PRESCRIPT ACCEPTED`;

    /* SEAL */

    document
    .getElementById("sealSfx")
    .play();

    seal.classList.add("show");

    btn.disabled = false;
}

/* ================================================= */
/* AMBIENT GLITCH */
/* ================================================= */

setInterval(()=>{

    if(Math.random() < .15){

        glitchFlash();
    }

},4000);

</script>

</body>
</html>
