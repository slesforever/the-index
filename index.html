<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE INDEX :: PRESCRIPT TERMINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
    --cyan:#00f2ff;
    --glow:rgba(0,242,255,.35);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    background:#000;
    overflow:hidden;
    width:100vw;
    height:100vh;
    color:var(--cyan);
    font-family:'Share Tech Mono', monospace;
}

/* ================================================= */
/* BACKGROUND */
/* ================================================= */

.bg{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(0,242,255,.05),
    transparent 60%),
    #000;

    z-index:-5;
}

/* ================================================= */
/* NOISE */
/* ================================================= */

.noise{
    position:fixed;
    inset:0;

    opacity:.04;

    background-image:
    repeating-radial-gradient(circle at 0 0,
    transparent 0,
    #fff 1px,
    transparent 2px);

    animation:noise .2s infinite;

    pointer-events:none;
}

@keyframes noise{

    0%{transform:translate(0,0);}
    25%{transform:translate(1px,-1px);}
    50%{transform:translate(-1px,1px);}
    75%{transform:translate(1px,1px);}
    100%{transform:translate(0,0);}
}

/* ================================================= */
/* CRT */
/* ================================================= */

.crt{
    position:fixed;
    inset:0;

    pointer-events:none;

    background:
    linear-gradient(rgba(255,255,255,.03) 50%, transparent 50%),
    linear-gradient(90deg,
    rgba(255,0,0,.02),
    rgba(0,255,255,.01),
    rgba(0,0,255,.02));

    background-size:100% 2px, 4px 100%;
}

/* ================================================= */
/* BOOT */
/* ================================================= */

#boot{
    position:fixed;
    inset:0;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:9999;
}

.boot-text{
    letter-spacing:8px;
    opacity:.65;
    margin-bottom:35px;
    font-size:.9rem;
}

.boot-btn{

    background:transparent;
    border:1px solid var(--cyan);

    color:var(--cyan);

    padding:18px 42px;

    font-family:'Share Tech Mono';

    letter-spacing:5px;

    cursor:pointer;

    transition:.25s;
}

.boot-btn:hover{

    background:var(--cyan);
    color:#000;

    box-shadow:0 0 25px var(--cyan);
}

/* ================================================= */
/* BOOT SCAN */
/* ================================================= */

#bootScan{

    position:fixed;

    top:-10%;
    left:0;

    width:100%;
    height:2px;

    background:white;

    box-shadow:
    0 0 20px white,
    0 0 70px white;

    opacity:0;

    z-index:99999;
}

#bootScan.active{
    animation:bootScan 1.6s ease;
}

@keyframes bootScan{

    0%{
        top:-10%;
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        top:110%;
        opacity:0;
    }
}

/* ================================================= */
/* TERMINAL */
/* ================================================= */

.screen{

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    opacity:0;

    transition:1.5s;
}

/* ================================================= */
/* LOGO */
/* ================================================= */

.logo{

    width:210px;

    margin-bottom:28px;

    opacity:.92;

    filter:
    drop-shadow(0 0 15px var(--glow));

    animation:float 5s ease-in-out infinite;
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-7px);
    }
}

/* ================================================= */
/* TERMINAL BOX */
/* ================================================= */

.terminal{

    width:82%;
    max-width:900px;

    height:520px;

    border:1px solid rgba(0,242,255,.15);

    background:
    linear-gradient(
    rgba(0,18,24,.82),
    rgba(0,7,10,.92));

    position:relative;

    overflow:hidden;

    box-shadow:
    0 0 35px rgba(0,242,255,.08),
    inset 0 0 60px rgba(0,242,255,.03);

    display:flex;
    flex-direction:column;
}

/* ================================================= */
/* HEADER */
/* ================================================= */

.header{

    height:58px;

    border-bottom:
    1px solid rgba(0,242,255,.08);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 24px;

    letter-spacing:3px;
    font-size:.75rem;

    opacity:.55;
}

/* ================================================= */
/* CONTENT */
/* ================================================= */

.content{

    flex:1;

    padding:65px;

    display:flex;
    flex-direction:column;

    overflow:hidden;

    position:relative;
}

/* ================================================= */
/* PRESCRIPT */
/* ================================================= */

.prescript{

    flex:1;

    overflow-y:auto;

    white-space:pre-wrap;

    color:white;

    font-family:'Noto Serif TC', serif;

    font-size:1.18rem;

    line-height:2.3;

    text-shadow:
    0 0 10px rgba(255,255,255,.05),
    0 0 20px rgba(0,242,255,.06);

    padding-right:8px;
}

.prescript::-webkit-scrollbar{
    width:3px;
}

.prescript::-webkit-scrollbar-thumb{
    background:rgba(0,242,255,.25);
}

/* ================================================= */
/* STATUS */
/* ================================================= */

.status{

    margin-top:28px;

    font-size:.7rem;

    letter-spacing:3px;

    opacity:.3;

    line-height:1.8;
}

/* ================================================= */
/* BUTTON */
/* ================================================= */

.receive{

    margin-top:30px;

    width:fit-content;

    background:transparent;

    border:1px solid rgba(0,242,255,.4);

    color:var(--cyan);

    padding:15px 32px;

    font-family:'Share Tech Mono';

    letter-spacing:4px;

    cursor:pointer;

    transition:.25s;
}

.receive:hover:not(:disabled){

    background:var(--cyan);

    color:black;

    box-shadow:0 0 20px var(--cyan);
}

.receive:disabled{

    opacity:.2;
    cursor:wait;
}

/* ================================================= */
/* SEAL */
/* ================================================= */

.seal{

    position:absolute;

    right:45px;
    bottom:38px;

    width:105px;
    height:105px;

    border-radius:50%;

    border:1px solid rgba(0,242,255,.2);

    display:flex;
    justify-content:center;
    align-items:center;

    color:rgba(0,242,255,.45);

    font-size:.72rem;

    letter-spacing:3px;

    transform:rotate(-14deg) scale(0);

    opacity:0;
}

.seal.show{
    animation:seal .45s ease forwards;
}

@keyframes seal{

    0%{
        transform:rotate(-14deg) scale(1.8);
        opacity:0;
    }

    100%{
        transform:rotate(-14deg) scale(1);
        opacity:.45;
    }
}

/* ================================================= */
/* GLITCH */
/* ================================================= */

.glitch{
    animation:glitch .08s infinite alternate;
}

@keyframes glitch{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(.4px);
    }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>
<div class="crt"></div>

<div id="bootScan"></div>

<!-- ================================================= -->
<!-- BOOT -->
<!-- ================================================= -->

<div id="boot">

<div class="boot-text">
CAUSALITY LINK IDLE
</div>

<button class="boot-btn" onclick="initializeTerminal()">
INITIALIZE CONNECTION
</button>

</div>

<!-- ================================================= -->
<!-- MAIN -->
<!-- ================================================= -->

<div class="screen" id="screen">

<img src="250px-LOR-Index-Icon.webp" class="logo">

<div class="terminal glitch">

<div class="header">

<div>
PRESCRIPT TERMINAL
</div>

<div>
LINK STATUS :: STABLE
</div>

</div>

<div class="content">

<div class="prescript" id="prescript">
等待某個東西傳來指令...
</div>

<div class="status" id="status"></div>

<button
class="receive"
id="receiveBtn"
onclick="receivePrescript()">

RECEIVE PRESCRIPT

</button>

<div class="seal" id="seal">
SEALED
</div>

</div>

</div>

</div>

<!-- ================================================= -->
<!-- AUDIO -->
<!-- ================================================= -->

<audio
id="bgm"
src="bgm.mp3"
loop
preload="auto"></audio>

<audio
id="message"
src="the-index-message.mp3"
preload="auto"></audio>

<script>

/* ================================================= */
/* RANDOM */
/* ================================================= */

function r(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function wr(arr){

    const total =
    arr.reduce((a,b)=>a+b.weight,0);

    let rand = Math.random()*total;

    for(let item of arr){

        rand -= item.weight;

        if(rand <= 0)
            return item.text;
    }

    return arr[0].text;
}

/* ================================================= */
/* DATABASE */
/* ================================================= */

const db = {

trigger:[

{text:"當第二次列車廣播結束時",weight:10},
{text:"於雨水碰觸鞋尖之後",weight:8},
{text:"當便利商店門鈴響起兩次時",weight:10},
{text:"在第三個路口之前",weight:7},
{text:"於午夜後第一道車燈掠過時",weight:6},
{text:"當走廊燈光短暫閃爍時",weight:9},
{text:"在無人注意的瞬間",weight:12},
{text:"於第九次呼吸結束後",weight:5},
{text:"當電子螢幕失去訊號時",weight:6},
{text:"在紅燈轉綠的第五秒",weight:8}

],

action:[

{text:"停下腳步三秒",weight:10},
{text:"將左手覆於胸前",weight:8},
{text:"折起任意一張收據",weight:7},
{text:"避免踩到地面的裂痕",weight:10},
{text:"將視線移向右側",weight:5},
{text:"默念第一個浮現的名字",weight:7},
{text:"輕敲牆面一次",weight:8},
{text:"保持沉默直到下一次鐘聲",weight:10},
{text:"不要觸碰任何玻璃表面",weight:9}

],

restriction:[

{text:"期間不得回頭",weight:10},
{text:"不可與任何人交談",weight:8},
{text:"勿確認時間",weight:8},
{text:"不可重新閱讀內容",weight:7},
{text:"不要理解其中意義",weight:6},
{text:"不可表露疑惑",weight:5},
{text:"勿注視自身倒影",weight:9}

],

fate:[

{text:"因果將自行完成編織。",weight:10},
{text:"你的位置已被記錄。",weight:7},
{text:"順從即為答案。",weight:9},
{text:"未被理解之物仍將被執行。",weight:10},
{text:"這是通往既定終點的細線之一。",weight:7},
{text:"織布機從不留下多餘的節點。",weight:6}

]

};

/* ================================================= */
/* CONDITIONAL */
/* ================================================= */

function conditional(action){

    if(action.includes("玻璃")){

        return "若已看見自身倒影，不可停留。";
    }

    if(action.includes("沉默")){

        return "若有人呼喚你的名字，不予回應。";
    }

    return "";
}

/* ================================================= */
/* BUILD */
/* ================================================= */

function buildPrescript(){

    const trigger = wr(db.trigger);
    const action = wr(db.action);
    const restriction = wr(db.restriction);
    const fate = wr(db.fate);

    const extra =
    conditional(action);

    return `「${trigger}，\n\n${action}。\n\n${restriction}。\n\n${extra}\n\n${fate}」`;
}

/* ================================================= */
/* BOOT */
/* ================================================= */

async function initializeTerminal(){

    const boot =
    document.getElementById("boot");

    const screen =
    document.getElementById("screen");

    const scan =
    document.getElementById("bootScan");

    const bgm =
    document.getElementById("bgm");

    bgm.volume = .42;

    bgm.play();

    scan.classList.add("active");

    await new Promise(r=>setTimeout(r,1600));

    boot.style.opacity = 0;

    screen.style.opacity = 1;

    setTimeout(()=>{
        boot.remove();
    },1200);
}

/* ================================================= */
/* TYPEWRITER */
/* ================================================= */

async function typeWriter(el,text){

    const sfx =
    document.getElementById("message");

    el.innerHTML = "";

    sfx.currentTime = 0;
    sfx.play();

    for(let i=0;i<text.length;i++){

        el.innerHTML += text[i];

        el.scrollTop =
        el.scrollHeight;

        let delay =
        28 + Math.random()*35;

        if(text[i] === "，")
            delay += 120;

        if(text[i] === "。")
            delay += 350;

        if(text[i] === "\n")
            delay += 180;

        if(Math.random() < .03)
            delay += 250;

        await new Promise(r=>setTimeout(r,delay));
    }
}

/* ================================================= */
/* RECEIVE */
/* ================================================= */

async function receivePrescript(){

    const btn =
    document.getElementById("receiveBtn");

    const seal =
    document.getElementById("seal");

    const status =
    document.getElementById("status");

    const terminal =
    document.querySelector(".terminal");

    btn.disabled = true;

    seal.classList.remove("show");

    status.innerHTML = "";

    terminal.style.filter =
    "brightness(1.3)";

    setTimeout(()=>{

        terminal.style.filter =
        "brightness(1)";
    },120);

    const text =
    buildPrescript();

    await typeWriter(
        document.getElementById("prescript"),
        text
    );

    status.innerHTML =
    `>> OBS_ID :: ${
        Math.floor(Math.random()*999999)
    }
    <br>
    >> PRESCRIPT RECEIVED
    <br>
    >> CAUSALITY STABLE`;

    seal.classList.add("show");

    btn.disabled = false;
}

</script>

</body>
</html>
