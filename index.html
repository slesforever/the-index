<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Index | Prescript Distribution</title>
    <style>
        :root {
            --index-cyan: #00f2ff;
            --index-cyan-glow: rgba(0, 242, 255, 0.5);
            --bg-black: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--index-cyan);
            font-family: "Noto Serif TC", "serif";
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 掃描線效果 (CRT效果) */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .terminal {
            width: 85%;
            max-width: 600px;
            padding: 40px;
            border: 1px solid var(--index-cyan);
            background: rgba(0, 0, 0, 0.85);
            position: relative;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.15);
        }

        /* 雙線裝飾 */
        .terminal::before {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            pointer-events: none;
        }

        .header-logo {
            width: 150px;
            display: block;
            margin: 0 auto 30px;
            filter: drop-shadow(0 0 8px var(--index-cyan-glow));
        }

        #display-area {
            min-height: 140px;
            border-top: 1px solid var(--index-cyan);
            border-bottom: 1px solid var(--index-cyan);
            padding: 30px 0;
            margin: 20px 0;
            text-align: center;
        }

        #prescript-text {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #fff;
            text-shadow: 0 0 5px var(--index-cyan);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #prescript-text.active { opacity: 1; }

        .reason {
            display: block;
            font-size: 0.85rem;
            margin-top: 15px;
            color: var(--index-cyan);
            opacity: 0.6;
            letter-spacing: 2px;
        }

        button {
            display: block;
            width: 200px;
            margin: 20px auto 0;
            background: transparent;
            border: 1px solid var(--index-cyan);
            color: var(--index-cyan);
            padding: 10px;
            cursor: pointer;
            letter-spacing: 5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--index-cyan);
            color: black;
            box-shadow: 0 0 15px var(--index-cyan);
        }

        /* 文字閃爍 (故障感) */
        .flicker {
            animation: glitch 0.2s infinite alternate;
        }

        @keyframes glitch {
            0% { opacity: 1; transform: skew(0deg); }
            20% { opacity: 0.8; transform: skew(1deg); }
            40% { opacity: 1; transform: skew(-1deg); }
            100% { opacity: 0.9; }
        }

        .char-span { display: inline-block; }
    </style>
</head>
<body>

    <div class="terminal">
        <img src="250px-LOR-Index-Icon.webp" alt="Index Logo" class="header-logo">
        
        <div id="display-area">
            <div id="prescript-text">AUTHENTICATING...</div>
        </div>

        <button onclick="fetchPrescript()">執行指令讀取</button>
    </div>

    <script>
        const prescripts = [
            { a: "在未來的24小時內，不得與任何人進行眼神接觸", r: "線條不需要多餘的交匯。" },
            { a: "將你今日獲得的第一枚硬幣拋入下水道", r: "以此平衡都市的流動。" },
            { a: "對著窗外的雨水低聲重複你的名字三次", r: "聲音將隨著濕氣編織進指令。" },
            { a: "在下一個路口右轉，直到遇見一隻黑色的生物為止", r: "追隨移動的陰影。" },
            { a: "用指尖在任何平面上刻畫出織布機的輪廓", r: "意志將在指尖具現。" }
        ];

        function fetchPrescript() {
            const display = document.getElementById('prescript-text');
            display.classList.remove('active');
            
            setTimeout(() => {
                const item = prescripts[Math.floor(Math.random() * prescripts.length)];
                // 將文字拆解並包裹以產生隨機閃爍
                const chars = `「${item.a}」`.split('').map(c => 
                    `<span class="char-span">${c}</span>`
                ).join('');
                
                display.innerHTML = `${chars}<span class="reason">— ${item.r}</span>`;
                display.classList.add('active');
                
                // 啟動隨機字元閃爍
                applyFlicker();
            }, 500);
        }

        function applyFlicker() {
            const spans = document.querySelectorAll('.char-span');
            setInterval(() => {
                const target = spans[Math.floor(Math.random() * spans.length)];
                if (target) {
                    target.classList.add('flicker');
                    setTimeout(() => target.classList.remove('flicker'), 150);
                }
            }, 400);
        }

        fetchPrescript();
    </script>
</body>
</html>
