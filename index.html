    <title>The Index | Weaver of Infinite Prescripts</title>
    <style>
        :root { --index-cyan: #00f2ff; --bg-black: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-black); color: var(--index-cyan); font-family: "Noto Serif TC", serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        body::after { content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.4) 50%); background-size: 100% 3px; pointer-events: none; z-index: 100; }
        .terminal { width: 95%; max-width: 850px; padding: 40px; border: 2px solid var(--index-cyan); background: rgba(0,0,0,0.95); position: relative; box-shadow: 0 0 50px rgba(0,242,255,0.3); text-align: center; }
        .header-logo { width: 120px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--index-cyan)); }
        #display-area { min-height: 280px; border-top: 1px solid var(--index-cyan); padding-top: 25px; margin-top: 20px; display: flex; flex-direction: column; justify-content: center; }
        #prescript-text { font-size: 1.1rem; line-height: 2.2; color: #fff; text-shadow: 0 0 10px var(--index-cyan); font-weight: 500; }
        .reason { display: block; font-size: 0.8rem; margin-top: 25px; color: var(--index-cyan); opacity: 0.5; letter-spacing: 2px; font-style: italic; }
        button { margin-top: 30px; background: transparent; border: 1px solid var(--index-cyan); color: var(--index-cyan); padding: 12px 35px; cursor: pointer; letter-spacing: 4px; transition: 0.3s; text-transform: uppercase; font-family: inherit; }
        button:hover:not(:disabled) { background: var(--index-cyan); color: #000; box-shadow: 0 0 20px var(--index-cyan); }
        button:disabled { opacity: 0.3; cursor: wait; }
        .char { display: inline-block; }
        .glitch { animation: glitch-anim 0.2s infinite; }
        @keyframes glitch-anim { 0% { opacity: 1; transform: skewX(0deg); } 50% { opacity: 0.3; transform: scale(1.1); color: #ff00ff; } 100% { opacity: 1; } }
    </style>
</head>
