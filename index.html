<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Index | Prescript Distribution Terminal</title>
    <style>
        /* 字體與霓虹藍配色 (沿用遊戲風格，並適配圖片) */
        :root {
            --neon-blue: #00f2ff;
            --neon-blue-light: #abf8ff; /* 用於主文字亮度 */
            --bg-black: #000000; /* 全黑背景 */
            --text-gray: #008080; /* 用於次要文字 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-blue-light);
            font-family: "Noto Serif TC", serif; /* 保留食指的古典感 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 主容器 (終端機視窗) */
        .terminal-container {
            width: 90%;
            max-width: 650px;
            padding: 40px;
            border: 2px solid var(--neon-blue);
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1), 
                        inset 0 0 20px rgba(0, 242, 255, 0.1),
                        0 0 15px rgba(0, 242, 255, 0.3);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 標頭區域：直接使用你的圖片 */
        .header-image {
            width: 100%; /* 視窗寬度 */
            max-width: 300px; /* 圖片最大尺寸 */
            display: block;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 5px var(--neon-blue)); /* 讓圖片標章也發光 */
        }

        /* 指令顯示區域 */
        #display-area {
            width: 100%;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            border-top: 1px solid var(--neon-blue);
            padding-top: 20px;
        }

        /* 主文字 (指令) */
        #prescript-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #fff; /* 接近純白強化亮度 */
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #prescript-text.active {
            opacity: 1;
        }

        /* 理由文字 */
        .reason-text {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-gray);
            font-style: italic;
            text-shadow: none;
        }

        /* 按鈕：霓虹風格 */
        button {
            margin-top: 30px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 30px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 3px;
            transition: all 0.3s;
            position: relative;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        button:hover {
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 隨機文字閃爍的 CSS (沿用) */
        .flicker-char {
            animation: randomFlicker 0.4s infinite alternate;
            animation-play-state: paused; 
        }

        @keyframes randomFlicker {
            0% { opacity: 1; text-shadow: 0 0 8px rgba(0, 242, 255, 0.6); }
            10% { opacity: 0.3; text-shadow: none; }
            15% { opacity: 1; text-shadow: 0 0 8px rgba(0, 242, 255, 0.6); }
            30% { opacity: 0.8; text-shadow: 0 0 2px var(--neon-blue); }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <img src="index.jpg" alt="The Index: SAIKAI" class="header-image">

        <div id="display-area">
            <div id="prescript-text">正在等待織布機連線...</div>
        </div>

        <button id="action-btn" onclick="getNewPrescript()">讀取指令</button>
    </div>

    <script>
        // 指令資料庫
        const database = [
            { a: "在未來的24小時內，不得觸碰任何金屬物品", r: "淨化被都市污染的感官。" },
            { a: "遇見第三個穿著紅色衣服的人時，對其深深鞠躬", r: "謙卑是維繫線條平衡的關鍵。" },
            { a: "在午夜時分，於家中角落點燃一支白色蠟燭並注視其熄滅", r: "黑暗中隱藏著紡織機的真理。" },
            { a: "找出一張空白的紙，畫上一個完美的圓，然後將其對摺四次", r: "圓滿與破碎皆在意志之中。" },
            { a: "步行前往最近的十字路口，在那裡佇立十分鐘", r: "交匯點的氣息是紡織機的燃料。" },
            { a: "用指尖沾取墨水，在你的手臂上畫出一個食指符號", r: "代行者的印記已在你的皮膚上生效。" }
        ];

        const btn = document.getElementById('action-btn');
        const textDisplay = document.getElementById('prescript-text');

        // === 接收指令與處理閃爍 ===
        function getNewPrescript() {
            btn.disabled = true;
            textDisplay.classList.remove('active');
            if (window.flickerInterval) clearInterval(window.flickerInterval);
            textDisplay.innerHTML = '正在解密...';

            setTimeout(() => {
                const item = database[Math.floor(Math.random() * database.length)];
                
                // 1. 包裹字元準備閃爍
                const processedAction = wrapCharsForFlicker(`「${item.a}」`);

                // 2. 渲染文字
                textDisplay.innerHTML = `
                    ${processedAction}
                    <span class="reason-text">— ${item.r}</span>
                `;
                textDisplay.classList.add('active');

                // 3. 啟動閃爍
                startRandomFlicker();

                btn.innerText = "接收新指令";
                btn.disabled = false;
            }, 1000);
        }

        function wrapCharsForFlicker(text) {
            return text.split('').map(char => {
                if (char === ' ' || char === '「' || char === '」') return char;
                return `<span class="flicker-char">${char}</span>`;
            }).join('');
        }

        function startRandomFlicker() {
            const charElements = document.querySelectorAll('.flicker-char');
            if (charElements.length === 0) return;
            window.flickerInterval = setInterval(() => {
                if (Math.random() > 0.08) return; // 調低機率讓它閃得更自然
                const numToFlicker = Math.floor(Math.random() * 2) + 1;
                for (let i = 0; i < numToFlicker; i++) {
                    const randomIndex = Math.floor(Math.random() * charElements.length);
                    const targetChar = charElements[randomIndex];
                    targetChar.style.animationPlayState = 'running';
                    setTimeout(() => { targetChar.style.animationPlayState = 'paused'; }, 400); 
                }
            }, 250);
        }
        
        // 初始化一條指令
        getNewPrescript();
    </script>
</body>
</html>
