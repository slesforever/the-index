<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>THE INDEX :: PRESCRIPT ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
    --cyan:#00f2ff;
    --cyan-soft:rgba(0,242,255,.15);
    --cyan-glow:rgba(0,242,255,.55);
    --bg:#020305;
    --paper:#dfe7ea;
    --danger:#ff4466;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    background:var(--bg);
    overflow:hidden;
    color:var(--cyan);
    font-family:'Share Tech Mono', monospace;
    width:100vw;
    height:100vh;
}

/* ================================================= */
/* SCREEN */
/* ================================================= */

.screen{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

/* ================================================= */
/* NOISE */
/* ================================================= */

.noise{
    position:fixed;
    inset:0;
    opacity:.07;
    background-image:
    repeating-radial-gradient(circle at 0 0,
    transparent 0,
    #fff 1px,
    transparent 2px);
    animation:noiseMove .18s infinite;
    pointer-events:none;
    z-index:900;
}

@keyframes noiseMove{
    0%{transform:translate(0,0);}
    25%{transform:translate(2px,-1px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(1px,-2px);}
    100%{transform:translate(0,0);}
}

/* ================================================= */
/* CRT */
/* ================================================= */

.crt{
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(255,255,255,.03) 50%, transparent 50%),
    linear-gradient(90deg,
    rgba(255,0,0,.03),
    rgba(0,255,255,.02),
    rgba(0,0,255,.03));
    background-size:100% 2px, 4px 100%;
    pointer-events:none;
    z-index:1000;
}

/* ================================================= */
/* MAIN PANEL */
/* ================================================= */

.panel{
    width:90%;
    max-width:1100px;
    height:85vh;
    border:1px solid var(--cyan-soft);
    background:rgba(0,10,15,.82);
    backdrop-filter:blur(8px);
    position:relative;
    overflow:hidden;
    box-shadow:
    0 0 40px rgba(0,242,255,.08),
    inset 0 0 80px rgba(0,242,255,.04);
}

/* ================================================= */
/* HEADER */
/* ================================================= */

.header{
    height:80px;
    border-bottom:1px solid var(--cyan-soft);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 35px;
    letter-spacing:4px;
}

.header-left{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.index-title{
    font-size:1.2rem;
    text-shadow:0 0 12px var(--cyan-glow);
}

.sub{
    opacity:.4;
    font-size:.75rem;
}

.mode{
    border:1px solid var(--cyan);
    padding:10px 18px;
    font-size:.8rem;
    cursor:pointer;
    transition:.25s;
}

.mode:hover{
    background:var(--cyan);
    color:black;
    box-shadow:0 0 20px var(--cyan);
}

/* ================================================= */
/* BODY */
/* ================================================= */

.body{
    height:calc(100% - 80px);
    display:grid;
    grid-template-columns: 1fr 300px;
}

/* ================================================= */
/* LEFT */
/* ================================================= */

.left{
    position:relative;
    padding:60px;
    overflow:hidden;
}

/* ================================================= */
/* PAPER */
/* ================================================= */

.paper{
    width:100%;
    min-height:500px;
    border:1px solid rgba(255,255,255,.06);
    background:
    linear-gradient(
    rgba(255,255,255,.015),
    rgba(255,255,255,.01));
    position:relative;
    overflow:hidden;
    padding:70px;
    box-shadow:
    inset 0 0 60px rgba(255,255,255,.015);
}

.paper::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top right,
    rgba(0,242,255,.08),
    transparent 40%);
    pointer-events:none;
}

/* ================================================= */
/* PRESCRIPT */
/* ================================================= */

.prescript{
    font-family:'Noto Serif TC', serif;
    color:var(--paper);
    font-size:1.55rem;
    line-height:2.7;
    text-shadow:0 0 8px rgba(255,255,255,.08);
    min-height:300px;
    white-space:pre-wrap;
}

/* ================================================= */
/* SEAL */
/* ================================================= */

.seal{
    position:absolute;
    right:50px;
    bottom:40px;
    width:120px;
    height:120px;
    border-radius:50%;
    border:2px solid rgba(0,242,255,.2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:.8rem;
    letter-spacing:3px;
    transform:rotate(-16deg);
    opacity:.35;
    box-shadow:0 0 30px rgba(0,242,255,.15);
}

/* ================================================= */
/* HANDWRITING */
/* ================================================= */

.note{
    position:absolute;
    color:rgba(255,255,255,.18);
    font-size:.75rem;
    transform:rotate(-7deg);
    font-family:cursive;
    pointer-events:none;
}

/* ================================================= */
/* RIGHT */
/* ================================================= */

.right{
    border-left:1px solid var(--cyan-soft);
    padding:30px;
    display:flex;
    flex-direction:column;
    gap:20px;
    position:relative;
}

/* ================================================= */
/* BUTTONS */
/* ================================================= */

.btn{
    background:transparent;
    border:1px solid var(--cyan);
    color:var(--cyan);
    padding:16px;
    cursor:pointer;
    letter-spacing:3px;
    transition:.25s;
    font-family:'Share Tech Mono';
}

.btn:hover{
    background:var(--cyan);
    color:black;
    box-shadow:0 0 25px var(--cyan);
}

.btn.active{
    background:var(--cyan);
    color:black;
}

/* ================================================= */
/* LOG */
/* ================================================= */

.log{
    flex:1;
    border:1px solid rgba(255,255,255,.05);
    padding:20px;
    overflow:auto;
    font-size:.75rem;
    opacity:.65;
    line-height:1.8;
}

.log::-webkit-scrollbar{
    width:4px;
}

.log::-webkit-scrollbar-thumb{
    background:var(--cyan);
}

/* ================================================= */
/* FOOTER */
/* ================================================= */

.footer{
    position:absolute;
    left:30px;
    bottom:18px;
    opacity:.3;
    font-size:.7rem;
    letter-spacing:2px;
}

/* ================================================= */
/* GLITCH */
/* ================================================= */

.glitch{
    animation:glitch .08s infinite alternate;
}

@keyframes glitch{
    from{transform:translateX(0);}
    to{transform:translateX(.7px);}
}

/* ================================================= */
/* PAGE TURN */
/* ================================================= */

.pageTurn{
    animation:pageTurn .7s ease;
}

@keyframes pageTurn{
    0%{
        transform:rotateY(90deg);
        opacity:0;
    }
    100%{
        transform:rotateY(0);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="noise"></div>
<div class="crt"></div>

<div class="screen">

<div class="panel">

<div class="header">

<div class="header-left">
<div class="index-title">THE INDEX :: CAUSALITY ENGINE</div>
<div class="sub">PRESCRIPT SYNCHRONIZATION ACTIVE</div>
</div>

<div id="modeLabel">PROXY MODE</div>

</div>

<div class="body">

<div class="left">

<div class="paper" id="paper">

<div class="prescript glitch" id="prescript">
等待接收因果編列...
</div>

<div class="seal" id="seal">
SEALED
</div>

</div>

<div class="footer">
OBSERVATION CHANNEL / DISTRICT UNKNOWN
</div>

</div>

<div class="right">

<button class="btn active" onclick="setMode('PROXY', this)">PROXY</button>
<button class="btn" onclick="setMode('MESSENGER', this)">MESSENGER</button>
<button class="btn" onclick="setMode('ARCHIVE', this)">ARCHIVE</button>
<button class="btn" onclick="setMode('DISTORTED', this)">DISTORTED</button>

<button class="btn" onclick="generatePrescript()">
RECEIVE PRESCRIPT
</button>

<div class="log" id="log"></div>

</div>

</div>

</div>

</div>

<!-- AUDIO -->
<audio id="chant" src="chant.mp3" preload="auto"></audio>
<audio id="paperSfx" src="paper.mp3" preload="auto"></audio>

<script>

/* ================================================= */
/* MODES */
/* ================================================= */

let currentMode = "PROXY";

/* ================================================= */
/* MEMORY */
/* ================================================= */

const memory = {
    used:new Set(),
    lastTheme:null
};

/* ================================================= */
/* HELPERS */
/* ================================================= */

function r(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function weightedRandom(arr){
    let total = arr.reduce((a,b)=>a+b.weight,0);
    let rand = Math.random()*total;

    for(let item of arr){
        rand -= item.weight;
        if(rand <= 0) return item.text;
    }

    return arr[0].text;
}

/* ================================================= */
/* GRAMMAR */
/* ================================================= */

const grammar = {

trigger:[
{text:"當第二次列車廣播結束時",weight:10},
{text:"於雨水碰觸鞋尖之後",weight:8},
{text:"當便利商店門鈴響起兩次時",weight:10},
{text:"在第三個路口之前",weight:9},
{text:"於午夜後第一道車燈掠過時",weight:7},
{text:"當有人與你擦肩而過時",weight:10},
{text:"於第九次呼吸結束後",weight:5},
{text:"在無人注意的瞬間",weight:12},
{text:"當螢幕短暫失去訊號時",weight:8},
{text:"當走廊燈光閃爍時",weight:7}
],

action:[
{text:"停下腳步三秒",weight:12},
{text:"將左手覆於胸前",weight:8},
{text:"折起任意一張紙張",weight:7},
{text:"不要踩到地面的裂痕",weight:10},
{text:"將視線移向右側",weight:7},
{text:"默念第一個浮現的名字",weight:6},
{text:"將硬幣留在無人發現之處",weight:5},
{text:"輕敲牆面一次",weight:8},
{text:"避免觸碰任何玻璃表面",weight:9},
{text:"保持沉默直到下一次鐘聲",weight:10}
],

restriction:[
{text:"期間不得回頭",weight:12},
{text:"不可與任何人交談",weight:10},
{text:"勿確認時間",weight:9},
{text:"不要理解其中意義",weight:8},
{text:"不可重新閱讀內容",weight:7},
{text:"期間保持呼吸平穩",weight:5},
{text:"不可表露疑惑",weight:6},
{text:"勿注視自身倒影",weight:10}
],

fate:[
{text:"因果將自行完成編織。",weight:10},
{text:"你的位置已被記錄。",weight:7},
{text:"順從即為答案。",weight:10},
{text:"織布機從不留下多餘的節點。",weight:7},
{text:"這是通往既定終點的細線之一。",weight:8},
{text:"未被理解之物仍將被執行。",weight:10},
{text:"你的步伐已被觀測。",weight:5}
]

};

/* ================================================= */
/* FORBIDDEN COMBINATIONS */
/* ================================================= */

function validate(trigger,action,restriction){

    if(
        action.includes("沉默")
        &&
        restriction.includes("交談")
    ){
        return false;
    }

    if(
        action.includes("視線")
        &&
        restriction.includes("勿注視")
    ){
        return false;
    }

    return true;
}

/* ================================================= */
/* CONDITIONAL RECURSION */
/* ================================================= */

function conditionalClause(action){

    if(action.includes("玻璃")){
        return "若你已看見自身倒影，請停留七秒。";
    }

    if(action.includes("沉默")){
        return "若有人呼喚你的名字，不予回應。";
    }

    if(action.includes("硬幣")){
        return "不可確認硬幣是否仍留於原位。";
    }

    return "";
}

/* ================================================= */
/* GENERATE */
/* ================================================= */

function buildSentence(){

    let trigger, action, restriction, fate;

    do{
        trigger = weightedRandom(grammar.trigger);
        action = weightedRandom(grammar.action);
        restriction = weightedRandom(grammar.restriction);
        fate = weightedRandom(grammar.fate);
    }
    while(!validate(trigger,action,restriction));

    const extra = conditionalClause(action);

    return `
「${trigger}，
${action}。

${restriction}。

${extra}

${fate}」
`;
}

/* ================================================= */
/* TYPEWRITER */
/* ================================================= */

async function typeText(el,text){

    el.innerHTML = "";

    for(let i=0;i<text.length;i++){

        el.innerHTML += text[i];

        let delay = 22 + Math.random()*30;

        if("，。".includes(text[i])) delay += 140;
        if("\n".includes(text[i])) delay += 250;

        await new Promise(r=>setTimeout(r,delay));
    }
}

/* ================================================= */
/* MODE */
/* ================================================= */

function setMode(mode,btn){

    currentMode = mode;

    document
    .querySelectorAll(".btn")
    .forEach(v=>v.classList.remove("active"));

    btn.classList.add("active");

    document.getElementById("modeLabel").innerText =
    mode + " MODE";
}

/* ================================================= */
/* NOTES */
/* ================================================= */

function addRandomNotes(){

    document
    .querySelectorAll(".note")
    .forEach(v=>v.remove());

    const notes = [
        "subject complied",
        "observation pending",
        "causality stable",
        "do not disclose",
        "cross-reference denied",
        "sequence incomplete",
        "distortion risk low"
    ];

    for(let i=0;i<4;i++){

        const div = document.createElement("div");

        div.className = "note";

        div.innerText = r(notes);

        div.style.left = Math.random()*70 + "%";
        div.style.top = Math.random()*80 + "%";

        div.style.transform =
        `rotate(${Math.random()*20-10}deg)`;

        document
        .getElementById("paper")
        .appendChild(div);
    }
}

/* ================================================= */
/* DISTORTED */
/* ================================================= */

function distort(text){

    const corrupted = [
        "不要閱讀此句。",
        "若你已閱讀，請忘記閱讀。",
        "修正程序已開始。",
        "THE PRESCRIPT HAS REWRITTEN ITSELF."
    ];

    return text + "\n\n" + r(corrupted);
}

/* ================================================= */
/* GENERATE MAIN */
/* ================================================= */

async function generatePrescript(){

    const paper =
    document.getElementById("paper");

    paper.classList.remove("pageTurn");

    void paper.offsetWidth;

    paper.classList.add("pageTurn");

    document
    .getElementById("paperSfx")
    .play();

    let text = buildSentence();

    if(currentMode === "MESSENGER"){

        text +=
        "\n\n織布機已觀測到你的步伐。";
    }

    if(currentMode === "ARCHIVE"){

        text =
`PRESCRIPT #${Math.floor(Math.random()*9999)}

STATUS : ACTIVE

${text}

RESULT : PENDING`;
    }

    if(currentMode === "DISTORTED"){

        text = distort(text);
    }

    addRandomNotes();

    await typeText(
        document.getElementById("prescript"),
        text
    );

    addLog(text);

    randomSeal();

    randomChant();
}

/* ================================================= */
/* SEAL */
/* ================================================= */

function randomSeal(){

    const seals = [
        "SEALED",
        "EXECUTED",
        "OBSERVED",
        "ARCHIVED",
        "CLASSIFIED",
        "UNREAD"
    ];

    document.getElementById("seal")
    .innerText = r(seals);
}

/* ================================================= */
/* LOG */
/* ================================================= */

function addLog(text){

    const log =
    document.getElementById("log");

    const line =
    document.createElement("div");

    line.innerHTML =
    `[${new Date().toLocaleTimeString()}]
    PRESCRIPT GENERATED`;

    log.prepend(line);
}

/* ================================================= */
/* CHANT */
/* ================================================= */

function randomChant(){

    if(Math.random() < .45){

        const audio =
        document.getElementById("chant");

        audio.volume = .25;

        audio.currentTime = 0;

        audio.play();
    }
}

/* ================================================= */
/* AUTO GLITCH */
/* ================================================= */

setInterval(()=>{

    if(Math.random() < .2){

        document.body.style.filter =
        "brightness(1.2)";

        setTimeout(()=>{

            document.body.style.filter =
            "brightness(1)";
        },80);
    }

},2500);

</script>

</body>
</html>
