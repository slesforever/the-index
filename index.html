<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>THE INDEX | PROXY_TERMINAL_V5.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --index-cyan: #00f2ff;
            --index-red: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--index-cyan);
            font-family: 'Noto Serif TC', serif;
        }

        /* 掃描線 */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 9999; pointer-events: none;
        }

        /* 電視開機動畫層 */
        #tv-boot-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: none; justify-content: center; align-items: center;
        }

        .boot-element { background: white; box-shadow: 0 0 20px white; }
        .stage-dot { width: 6px; height: 6px; border-radius: 50%; animation: flash 0.6s infinite; }
        .stage-line { width: 100%; height: 2px; transition: 0.3s; }
        .stage-full { width: 100%; height: 100%; background: transparent; transition: 0.5s; }

        @keyframes flash { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* BIOS 初始化畫面 */
        #init-screen {
            z-index: 5000; text-align: center; border: 1px solid var(--index-cyan);
            padding: 60px; background: rgba(0, 20, 20, 0.9);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .main-btn {
            background: transparent; border: 1px solid var(--index-cyan);
            color: var(--index-cyan); padding: 18px 45px;
            font-family: 'Share Tech Mono', monospace; cursor: pointer;
            letter-spacing: 8px; font-size: 1.1rem; transition: 0.3s;
        }
        .main-btn:hover:not(:disabled) { background: var(--index-cyan); color: #000; box-shadow: 0 0 40px var(--index-cyan); }

        /* 主介面 */
        #terminal-ui {
            display: none; flex-direction: column; align-items: center;
            width: 90%; max-width: 800px;
        }

        /* 圖片上下緩慢漂浮效果 */
        .logo-box { 
            margin-bottom: 40px; 
            animation: float-slow 4s ease-in-out infinite;
        }
        .logo-img { width: 160px; filter: drop-shadow(0 0 10px var(--index-cyan)); }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #text-container {
            width: 100%; min-height: 280px; padding: 50px;
            border: 1px solid rgba(0, 242, 255, 0.4);
            background: rgba(0, 5, 5, 0.95);
            text-align: center; display: flex; flex-direction: column; justify-content: center;
        }

        .main-text { font-size: 1.4rem; line-height: 2.2; color: #fff; text-shadow: 0 0 10px var(--index-cyan); }

        /* SEVERED 恐怖模式 */
        body.severed-status { animation: shake-screen 0.05s infinite; background: #200 !important; }
        @keyframes shake-screen { 0% { transform: translate(3px, 3px); } 100% { transform: translate(-3px, -3px); } }
        
        #severed-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.5); display: none;
            z-index: 20000; justify-content: center; align-items: center;
            color: white; font-size: 7rem; font-weight: 900; letter-spacing: 30px;
            text-shadow: 0 0 30px black; pointer-events: none;
        }

        #yt-api { position: absolute; top: -999px; visibility: hidden; }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div id="severed-msg">SEVERED</div>

    <div id="yt-api"><div id="player"></div></div>

    <div id="tv-boot-overlay">
        <div id="boot-core" class="boot-element stage-dot"></div>
    </div>

    <div id="init-screen">
        <h1 style="margin-bottom: 40px; letter-spacing: 5px; font-weight: 400;">INDEX_TERMINAL_V5.3</h1>
        <button class="main-btn" onclick="performBoot()">[ INITIALIZE ]</button>
    </div>

    <div id="terminal-ui">
        <div class="logo-box">
            <img src="250px-LOR-Index-Icon.webp" class="logo-img">
        </div>
        <div id="text-container">
            <div class="main-text" id="target-output">...等待因果聯繫...</div>
        </div>
        <button class="main-btn" id="recv-btn" onclick="generateCommand()" style="margin-top: 40px; font-size: 1rem;">接收指令</button>
    </div>

    <audio id="sfx-weave" src="the-index-message.mp3"></audio>

    <script>
        var player;
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: '7HHJFKtFiSE',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': '7HHJFKtFiSE' }
            });
        }

        function performBoot() {
            document.getElementById('init-screen').style.display = 'none';
            const overlay = document.getElementById('tv-boot-overlay');
            const core = document.getElementById('boot-core');
            overlay.style.display = 'flex';

            setTimeout(() => {
                core.classList.remove('stage-dot');
                core.classList.add('stage-line');
                setTimeout(() => {
                    core.classList.add('stage-full');
                    if(player && player.playVideo) player.playVideo();
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        document.getElementById('terminal-ui').style.display = 'flex';
                    }, 600);
                }, 400);
            }, 1000);
        }

        const library = {
            time: ["在落日最後一抹餘暉被都市吞噬時", "當霓虹燈閃爍出頻率異常的斷裂聲後", "在感覺到血管搏動與秒針完全重合的一瞬", "當深夜三點與四點的夾縫，影子最長時", "在聽見家中的電器發出不屬於此世的鳴叫時"],
            loc: ["在23區那條佈滿鏽蝕與腐敗氣味的死巷", "對著鏡中那張笑容逐漸崩壞、不再是你的臉孔", "於L區廢棄工廠內，那台正渴求鮮血的織布機前", "站在巢的邊界，凝視著被焦油與謊言覆蓋的廢墟", "在一個充滿回聲且絕對沒有出口的地下長廊盡頭"],
            act: ["將左手的小指緩緩浸入零度的冰水中", "用指尖在斑駁牆面摳抓出一道扭曲的因果線", "將寫有你真名的紙條在指尖一點點撕碎並吞下", "逆時針原地旋轉四次，直到感覺靈魂發生位移", "對著虛無的陰影進行一次最沈重、最卑微的跪拜"],
            target: ["隨後靜候那早已寫在因果紡織中的終局", "接著將這段指令從你的靈魂中徹底剜去", "並向著永恆的織布機獻上最後的、無言的順從", "感受因果的絞索在頸部緩緩收緊的冰冷質感", "隨即轉身步入黑暗，此生不得再次回頭望向光明"],
            reason: ["線條必須筆直，代價由代行者支付。", "因果已定，質疑者即為這座都市的罪人。", "這是維持平衡的必要之惡，無需理解。", "織布機看見了你的終點。服從，或是終結。"]
        };

        function generateCommand() {
            const crashChance = Math.random() < 0.04;
            const btn = document.getElementById('recv-btn');
            const output = document.getElementById('target-output');
            const sfx = document.getElementById('sfx-weave');

            btn.disabled = true;
            output.innerHTML = "";

            if (crashChance) {
                // 音樂停止
                if(player && player.stopVideo) player.stopVideo();
                
                document.body.classList.add('severed-status');
                document.getElementById('severed-msg').style.display = 'flex';
                
                let c = 0;
                const cr = setInterval(() => {
                    output.innerText = "CAUSE_SEVERED: " + Math.random().toString(16).toUpperCase();
                    c++;
                    if(c > 45) {
                        clearInterval(cr);
                        setTimeout(() => location.reload(), 2000);
                    }
                }, 50);
            } else {
                const cmd = `「${r(library.time)}，${r(library.loc)}，${r(library.act)}，${r(library.target)}。」`;
                const rsn = r(library.reason);
                sfx.currentTime = 0;
                sfx.play();

                let i = 0;
                const typing = setInterval(() => {
                    if (i < cmd.length) {
                        output.innerHTML += cmd[i++];
                    } else {
                        clearInterval(typing);
                        const rDiv = document.createElement('div');
                        rDiv.style = "margin-top:30px; opacity:0.4; font-size:0.9rem; font-style:italic;";
                        rDiv.innerText = `— ${rsn}`;
                        output.appendChild(rDiv);
                        btn.disabled = false;
                    }
                }, (sfx.duration * 1000) / cmd.length);
            }
        }

        function r(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    </script>
</body>
</html>
