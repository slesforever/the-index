<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>The Index | Weaver Terminal V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --index-cyan: #00f2ff;
            --index-red: #ff003c;
            --index-bg: #020505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: #000; overflow: hidden; font-family: 'Noto Serif TC', serif; }

        /* 背景網格 */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* CRT 掃描線 */
        .crt {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }

        /* 開機畫面 */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }

        .boot-box {
            border: 1px solid var(--index-cyan);
            padding: 40px;
            background: rgba(0, 20, 20, 0.5);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            text-align: center;
        }

        .boot-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            margin-bottom: 20px;
            letter-spacing: 5px;
            color: var(--index-cyan);
        }

        .init-btn {
            background: transparent;
            border: 1px solid var(--index-cyan);
            color: var(--index-cyan);
            padding: 15px 40px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .init-btn:hover {
            background: var(--index-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--index-cyan);
        }

        #boot-logs {
            margin-top: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--index-cyan);
            text-align: left;
            width: 300px;
            height: 80px;
            overflow: hidden;
            opacity: 0.6;
        }

        /* 像素劃開動畫相關 */
        .door {
            position: fixed;
            top: 0; width: 50%; height: 100%;
            background: #000;
            z-index: 4000;
            transition: transform 1s steps(10); /* 像素風格階梯式過渡 */
        }
        .door-left { left: 0; border-right: 1px solid var(--index-cyan); }
        .door-right { right: 0; border-left: 1px solid var(--index-cyan); }

        .opened .door-left { transform: translateX(-100%); }
        .opened .door-right { transform: translateX(100%); }

        /* 主界面 */
        .terminal {
            width: 85%;
            max-width: 850px;
            padding: 50px;
            border: 1px solid var(--index-cyan);
            background: rgba(2, 10, 10, 0.95);
            text-align: center;
            z-index: 100;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        .header-logo { width: 140px; margin-bottom: 30px; filter: drop-shadow(0 0 10px var(--index-cyan)); }

        #display-area {
            min-height: 250px;
            margin: 20px 0;
            padding: 30px;
            border-top: 1px solid rgba(0, 242, 255, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #prescript-text { font-size: 1.3rem; line-height: 2; color: #fff; text-shadow: 0 0 10px var(--index-cyan); }

        /* 崩潰模式 */
        body.crash { animation: shake 0.1s infinite; }
        body.crash .terminal { border-color: var(--index-red); box-shadow: 0 0 50px var(--index-red); }
        body.crash #prescript-text, body.crash .reason { color: var(--index-red) !important; text-shadow: 0 0 15px var(--index-red); }
        
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-2px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 2px) rotate(1deg); }
        }

        button:disabled { opacity: 0.3; }

        /*隱藏 Youtube 元素*/
        #player { position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body id="body">

    <div class="grid-bg"></div>
    <div class="crt"></div>

    <div id="player"></div>

    <div id="transition-container">
        <div class="door door-left"></div>
        <div class="door door-right"></div>
    </div>

    <div id="boot-screen">
        <div class="boot-box">
            <div class="boot-title">THE INDEX - TERMINAL PROXY v4.0.1</div>
            <button class="init-btn" onclick="initTerminal()">[ 執行初始化 ]</button>
            <div id="boot-logs"></div>
        </div>
    </div>

    <div class="terminal" id="main-ui">
        <img src="250px-LOR-Index-Icon.webp" alt="Logo" class="header-logo">
        <div id="display-area">
            <div id="prescript-text">等待指令輸入...</div>
        </div>
        <button class="init-btn" id="gen-btn" onclick="processPrescript()" style="font-size: 1rem;">接收指令</button>
    </div>

    <audio id="type-audio" src="the-index-message.mp3"></audio>

    <script>
        // --- YouTube API 設置 ---
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: '7HHJFKtFiSE',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': '7HHJFKtFiSE' },
                events: { 'onReady': onPlayerReady }
            });
        }
        function onPlayerReady(event) { console.log("BGM Ready"); }

        // --- 擴充詞庫 (100+ 零件簡化版，建議自行填滿) ---
        const data = {
            time: ["在午夜與黎明的交界處", "當你感覺到第三次眨眼的瞬間", "在日落最後一道光線斷裂時", "當自動販賣機發出低鳴後", "當耳鳴的音調升至最高點時", "在看見路人影子重疊的瞬間", "當螢幕出現雪花般閃爍時", "在雨水滴落第十次的那一秒", "當你聽見遠處傳來破碎聲時", "在呼吸節奏變得不自然的剎那"],
            loc: ["在23區那條佈滿鏽跡的後巷", "於L區廢棄的加工廠二樓", "對著浴室鏡中那張扭曲的臉", "在存放遺憾的深色抽屜前", "站在巢的邊緣俯瞰著焦土", "在無人的圖書館迴廊深處", "對著一台運轉異常的織布機", "站在被月光照亮的冷硬地板上", "於充滿消毒水味的樓梯間", "在一個只有你記得的祕密座標"],
            act: ["將左手食指按壓在冰冷的牆面", "撕碎一張不再有用的舊照片", "逆時針旋轉三圈並保持沈默", "將三枚硬幣整齊擺放在桌緣", "用指尖在地板上劃出因果線", "閉上眼走完最後的七步距離", "將杯中最後的水灑向陰影處", "重複低語一個被遺忘的名字", "將衣領解開並棄置在長椅上", "在掌心寫下代行者三個字"],
            target: ["隨後等待那必然的終結", "接著將這一切從記憶中抹除", "並向著虛無的織布機低頭", "同時確認這份因果已經閉環", "隨即轉身離開，不可回頭", "感受血液在指尖搏動的速度", "讓這份寂靜徹底吞噬意識", "並在此處佇立至感覺惡寒", "隨後聽見齒輪囓合的聲響", "接著完成這場卑微的儀式"],
            rsn: ["這是為了讓線條保持筆直。", "因果的紡織不容許任何質疑。", "指令是維持都市運行的骨架。", "代價已支付，恩寵將至。", "織布機已預見了你的路徑。"]
        };

        const bootLogs = [
            "Loading Neural Link...", "Syncing with Hub 23...", "Authenticating Proxy...",
            "Cause and Effect: CALCULATING", "Downloading Textile Patterns...", "SYSTEM READY."
        ];

        // --- 核心邏輯 ---
        function initTerminal() {
            // 載入 API 腳本
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            var firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            const logBox = document.getElementById('boot-logs');
            document.querySelector('.init-btn').disabled = true;

            let i = 0;
            const logInterval = setInterval(() => {
                if (i < bootLogs.length) {
                    const p = document.createElement('p');
                    p.innerText = `> ${bootLogs[i]}`;
                    logBox.appendChild(p);
                    i++;
                } else {
                    clearInterval(logInterval);
                    setTimeout(() => {
                        // 播放背景音樂
                        if (player) player.playVideo();
                        // 執行劃開動畫
                        document.getElementById('transition-container').classList.add('opened');
                        document.getElementById('boot-screen').style.display = 'none';
                    }, 800);
                }
            }, 400);
        }

        function processPrescript() {
            const isCrash = Math.random() < 0.03; // 3% 崩潰機率
            const btn = document.getElementById('gen-btn');
            const display = document.getElementById('prescript-text');
            const body = document.getElementById('body');
            const audio = document.getElementById('type-audio');

            btn.disabled = true;
            display.innerHTML = "";

            if (isCrash) {
                triggerCrash(body, display);
            } else {
                generateNormal(display, audio, btn);
            }
        }

        function generateNormal(display, audio, btn) {
            const text = `「${r(data.time)}，${r(data.loc)}，${r(data.act)}，${r(data.target)}。」`;
            const reason = r(data.rsn);
            
            audio.currentTime = 0;
            audio.play();
            
            let i = 0;
            const delay = (audio.duration * 1000) / text.length;
            const typer = setInterval(() => {
                if (i < text.length) {
                    display.innerHTML += text[i++];
                } else {
                    clearInterval(typer);
                    const rs = document.createElement('div');
                    rs.style.fontSize = "0.9rem";
                    rs.style.marginTop = "20px";
                    rs.style.opacity = "0.5";
                    rs.innerText = `— ${reason}`;
                    display.appendChild(rs);
                    btn.disabled = false;
                }
            }, delay);
        }

        function triggerCrash(body, display) {
            body.classList.add('crash');
            let count = 0;
            const glitcher = setInterval(() => {
                display.innerText = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                count++;
                if (count > 30) {
                    clearInterval(glitcher);
                    display.innerText = "CRITICAL ERROR: CAUSE DISCONNECTED";
                    setTimeout(() => {
                        // 強制關機回到初始狀態
                        location.reload(); 
                    }, 2000);
                }
            }, 50);
        }

        function r(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    </script>
</body>
</html>
