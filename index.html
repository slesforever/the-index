<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>THE INDEX | INFINITE_MATRIX_V9.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --cyan-glow: rgba(0, 242, 255, 0.4); --bg: #010101; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; }
        body { background: var(--bg); height: 100vh; width: 100vw; overflow: hidden; display: flex; justify-content: center; align-items: center; color: var(--cyan); font-family: 'Share Tech Mono', monospace; }

        .crt-filter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)); background-size: 100% 2px, 3px 100%; z-index: 9999; pointer-events: none; }
        
        @keyframes monitor-shake { 0% { transform: translate(0.2px, 0.2px); } 50% { transform: translate(-0.2px, -0.2px); } 100% { transform: translate(0.2px, -0.2px); } }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: monitor-shake 0.15s infinite; }

        .ripple { position: absolute; border: 1px solid var(--cyan); border-radius: 50%; transform: scale(0); animation: ripple-anim 0.7s ease-out; pointer-events: none; z-index: 999; }
        @keyframes ripple-anim { to { transform: scale(8); opacity: 0; } }

        #boot-anim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; justify-content: center; align-items: center; }
        .scan-line { width: 100%; height: 2px; background: #fff; box-shadow: 0 0 20px #fff; transform: scaleX(0); transition: 0.5s; }
        .scan-line.active { transform: scaleX(1); }
        .scan-line.expand { height: 100%; background: transparent; }

        #terminal-ui { display: none; flex-direction: column; align-items: center; width: 90%; max-width: 950px; }
        .logo-img { width: 250px; margin-bottom: 30px; filter: drop-shadow(0 0 15px var(--cyan-glow)); animation: logo-float 5s ease-in-out infinite; }
        @keyframes logo-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .display-frame { width: 100%; min-height: 420px; padding: 60px; border: 1px solid var(--cyan-glow); background: rgba(0, 5, 5, 0.9); position: relative; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .corner { position: absolute; width: 20px; height: 20px; border: 2px solid var(--cyan); }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .will-text { font-family: 'Noto Serif TC', serif; font-size: 1.8rem; font-weight: 600; line-height: 2.6; color: #fff; text-shadow: 0 0 10px var(--cyan-glow); }
        .meta-data { margin-top: 40px; font-size: 0.8rem; color: var(--cyan); opacity: 0.4; letter-spacing: 3px; }

        .btn-index { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 18px 50px; font-family: 'Share Tech Mono'; font-size: 1.1rem; letter-spacing: 6px; cursor: pointer; transition: 0.3s; margin-top: 40px; }
        .btn-index:hover:not(:disabled) { background: var(--cyan); color: #000; box-shadow: 0 0 35px var(--cyan); }
        .btn-index:disabled { opacity: 0.2; cursor: wait; }

        #init-layer { z-index: 5000; text-align: center; }
    </style>
</head>
<body onclick="createRipple(event)">

    <div class="crt-filter"></div>
    <div id="boot-anim"><div id="boot-bar" class="scan-line"></div></div>

    <div class="screen">
        <div id="init-layer">
            <h2 style="letter-spacing: 10px; margin-bottom: 30px; opacity: 0.7;">CAUSALITY_LINK_IDLE</h2>
            <button class="btn-index" onclick="bootSequence()">[ INITIALIZE_CONNECTION ]</button>
        </div>

        <div id="terminal-ui">
            <img src="250px-LOR-Index-Icon.webp" class="logo-img" alt="THE_INDEX">
            <div class="display-frame">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
                <div id="will-output" class="will-text">...等待因果序列接入...</div>
                <div id="meta-output" class="meta-data"></div>
            </div>
            <button class="btn-index" id="recv-btn" onclick="receiveInstruction()">接收神諭 (RECEIVE WILL)</button>
        </div>
    </div>

    <audio id="sfx-msg" src="the-index-message.mp3" preload="auto"></audio>

    <script>
        // --- 無限隨機矩陣引擎 ---
        const Matrix = {
            // [時間] 組合：當 + 主體 + 狀態/動作
            time: {
                start: ["當", "在", "於"],
                subject: ["都市第 444 盞路燈", "電梯顯示螢幕的數字", "通訊軟體顯示的『對方正在輸入中』", "便利商店自動門的電子鈴聲", "你手機螢幕上的倒影", "空氣中鐵鏽的氣味", "複情者的心跳頻率", "時鐘秒針的跳動間隔", "深夜外送員的發動機車聲", "視網膜殘留的藍光餘影", "地下室傳來的金屬摩擦聲", "街道積水的霓虹倒影", "口罩下的沈重呼吸聲", "電腦散熱風扇的轟鳴"],
                action: ["發生微小磁場偏轉時", "與你的脈搏達到同步之際", "產生不可見的認知遲滯後", "連續閃爍三次代表拒絕時", "因電壓不穩而發生顫震時", "被社會標籤徹底定義的一瞬", "指向一個不存在的座標時", "達到攝氏 37 度的臨界點後", "從你的意識中暫時格式化時", "發出非人性的高頻哀鳴之際", "與都市的工業節律重合時"]
            },
            // [地點] 組合：前往/在 + 特定區域 + 狀態描寫
            loc: {
                pre: ["前往", "在", "抵達"],
                place: ["23 區那間堆滿義體零件的地下室", "那面映照出扭曲社會性標籤的鏡子前", "L 區那台正處於熱過載邊緣的織布機旁", "巢的邊界那處被遺忘的荒涼廢墟", "充滿回聲且絕對不存在出口的長廊盡頭", "充滿福馬林與鐵鏽味的廢棄物處理場", "地圖上被標記為『認知盲區』的狹窄巷弄", "那個充滿虛假視線卻空無一人的公共廣場", "深夜那個散發著油煙與冷漠氣味的連鎖超市", "被社會系統判定為『冗餘空間』的舊貨倉", "感覺到重力異常的負三層立體停車場"],
                desc: ["並在那裡靜候因果的接入", "在那處被標籤化社會遺忘的角落", "在那裡感受被他人視線縫補的痛苦", "在那處認知框架崩解的中心點", "在那個充滿『猜測』的沈默空腔內"]
            },
            // [行動] 組合：動詞 + 受詞 + 目標
            act: {
                verb: ["用指甲在牆上摳抓出", "將寫滿偏見與猜測的紙條", "逆時針原地旋轉", "對著空無一人的陰影進行", "將右手食指浸入", "重複唸誦", "用冰冷的金屬片刻下", "在地板上精確地劃出", "閉上眼試圖在腦海模擬", "將隨身電子設備完全"],
                target: ["12 條平行的血痕", "燒成灰燼並混合冷水吞下", "44 圈直到重力感完全喪失", "長達 10 分鐘的社會性猜測", "溫度為 4 度的生理鹽水中", "『我即是因果的盲點』直到語言失義", "織布機的齒輪編號", "100 個大小一致的圓圈", "整個都市崩塌的聲響", "拆解並重新組裝"]
            },
            // [結果] 組合：隨後 + 狀態敘述
            res: ["隨後靜候那早已寫在因果紡織中的終局。", "接著將這段指令從你的認知框架中徹底格式化。", "並向這座都市的因果規律獻上你最後的服從。", "感受社會標籤在你的靈魂深處緩緩收緊的質感。", "隨即步入黑暗，此生不再試圖探尋所謂的真相。", "因果已定，質疑者將被視為社會系統的冗餘物。", "織布機看見了你的終點。服從，或是被抹除。", "這份苦修將成為因果線中微道的一個節點。"]
        };

        function r(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // 核心邏輯：動態組合
        function getInfiniteWill() {
            const time = `${r(Matrix.time.start)}${r(Matrix.time.subject)}${r(Matrix.time.action)}`;
            const loc = `${r(Matrix.loc.pre)}${r(Matrix.loc.place)}${r(Matrix.loc.desc)}`;
            const act = `${r(Matrix.act.verb)}${r(Matrix.act.target)}`;
            const res = r(Matrix.res);
            return `「${time}，${loc}，${act}，${res}」`;
        }

        function bootSequence() {
            document.getElementById('init-layer').style.display = 'none';
            const layer = document.getElementById('boot-anim');
            const bar = document.getElementById('boot-bar');
            layer.style.display = 'flex';
            setTimeout(() => {
                bar.classList.add('active');
                setTimeout(() => {
                    bar.classList.add('expand');
                    setTimeout(() => {
                        layer.style.display = 'none';
                        document.getElementById('terminal-ui').style.display = 'flex';
                    }, 400);
                }, 600);
            }, 200);
        }

        function receiveInstruction() {
            const btn = document.getElementById('recv-btn');
            const out = document.getElementById('will-output');
            const meta = document.getElementById('meta-output');
            const sfx = document.getElementById('sfx-msg');

            btn.disabled = true;
            out.innerHTML = "";
            meta.innerText = "";

            const text = getInfiniteWill();
            sfx.currentTime = 0;
            sfx.play();

            // 抓取音效長度動態配速
            const duration = (sfx.duration && isFinite(sfx.duration)) ? sfx.duration * 1000 : 3800;
            const charDelay = duration / text.length;

            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    out.innerHTML += text[i++];
                } else {
                    clearInterval(timer);
                    meta.innerText = `>> OBS_ID: ${Math.floor(Math.random()*888888)} | SYNC_RATE: ${(Math.random()*0.99).toFixed(4)} | GUESS_ESTABLISHED`;
                    btn.disabled = false;
                }
            }, charDelay);
        }

        function createRipple(e) {
            const ripple = document.createElement("div");
            ripple.className = "ripple";
            ripple.style.left = e.clientX + "px"; ripple.style.top = e.clientY + "px";
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);
        }
    </script>
</body>
</html>
